<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOEIC Part 7 構造学習</title>
<style>
:root {
  --bg: #f5f6f8;
  --card: #ffffff;
  --ink: #1f2330;
  --muted: #6b7280;
  --line: #e3e6eb;
  --accent: #2563eb;
  --accent-soft: #eaf0ff;
  --good: #15803d;
  --good-bg: #e7f6ec;
  --bad: #b91c1c;
  --bad-bg: #fdeaea;
  --evidence: #fff3bf;
  --radius: 12px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
    "Noto Sans JP", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.7;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 18px 80px;
}

/* ---- header ---- */
.site-header {
  background: var(--card);
  border-bottom: 1px solid var(--line);
  padding: 22px 18px;
  text-align: center;
}
.site-header h1 {
  margin: 0;
  font-size: 1.4rem;
}
.lead {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 0.9rem;
}
.study-header {
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
}
.study-header h1 {
  font-size: 1.1rem;
}
.back-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  white-space: nowrap;
}

/* ---- type grid ---- */
.type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 14px;
}
.type-card {
  display: block;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
}
a.type-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
  border-color: var(--accent);
}
.type-card.is-disabled {
  opacity: 0.55;
  cursor: not-allowed;
}
.type-order {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.04em;
}
.type-name {
  margin: 4px 0 2px;
  font-size: 1.02rem;
}
.type-name-en {
  margin: 0;
  font-size: 0.78rem;
  color: var(--muted);
}
.type-desc {
  margin: 8px 0 12px;
  font-size: 0.82rem;
  color: #444b59;
  min-height: 2.4em;
}
.type-progress {
  font-size: 0.8rem;
  color: var(--muted);
  border-top: 1px dashed var(--line);
  padding-top: 8px;
}
.type-progress.is-complete {
  color: var(--good);
  font-weight: 700;
}

/* ---- blocks ---- */
.block {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 18px;
}
.block i {
  font-style: italic;
}
.block h2 {
  margin: 0 0 10px;
  font-size: 1.05rem;
  border-left: 4px solid var(--accent);
  padding-left: 10px;
}

/* prediction */
.block-prediction {
  background: var(--accent-soft);
  border-color: #cdddff;
}
.pred-note {
  margin: 0 0 8px;
  font-weight: 600;
}
.pred-supplement {
  font-weight: 500;
  color: #334;
}
.pred-points {
  margin: 6px 0 0;
  padding-left: 1.2em;
  font-size: 0.9rem;
}

/* passage */
.directions {
  font-style: italic;
  color: var(--muted);
  font-size: 0.88rem;
  margin: 0 0 12px;
}
.doc {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  background: #fcfcfd;
}
.doc + .doc {
  margin-top: 18px;
}
.doc-label {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--accent);
  background: var(--accent-soft);
  border-radius: 999px;
  padding: 2px 10px;
  margin-bottom: 10px;
}
.url-bar {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.78rem;
  color: var(--muted);
  background: #eef0f3;
  border-radius: 6px;
  padding: 4px 8px;
  margin-bottom: 10px;
  word-break: break-all;
}
.doc-title {
  margin: 0 0 10px;
  font-size: 1.05rem;
}
.doc-header {
  font-size: 0.85rem;
  color: #334;
  border-bottom: 1px solid var(--line);
  padding-bottom: 8px;
  margin-bottom: 10px;
}
.doc-header .hk {
  display: inline-block;
  min-width: 58px;
  color: var(--muted);
  font-weight: 700;
}
.doc-body {
  font-size: 0.98rem;
}
.segment {
  border-radius: 4px;
  transition: background 0.2s ease;
}
.segment.is-evidence {
  background: var(--evidence);
  box-shadow: 0 0 0 2px var(--evidence);
}

/* questions */
.question {
  border-top: 1px solid var(--line);
  padding-top: 16px;
  margin-top: 16px;
}
.question:first-of-type {
  border-top: none;
  padding-top: 0;
  margin-top: 0;
}
.q-stem {
  font-weight: 600;
  margin: 0 0 10px;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.choice {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  text-align: left;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 0.92rem;
  cursor: pointer;
  font-family: inherit;
  color: inherit;
}
.choice:hover:not(:disabled) {
  border-color: var(--accent);
}
.choice.is-selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.choice:disabled {
  cursor: default;
}
.choice.is-correct {
  border-color: var(--good);
  background: var(--good-bg);
}
.choice.is-wrong {
  border-color: var(--bad);
  background: var(--bad-bg);
}
.choice-id {
  font-weight: 700;
  color: var(--accent);
}
.grade-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: inherit;
}
.grade-btn:disabled {
  background: #b8c0cf;
  cursor: not-allowed;
}
.feedback {
  margin-top: 12px;
  background: #fafbfc;
  border-radius: 8px;
  padding: 10px 14px;
}
.verdict {
  margin: 0 0 6px;
  font-weight: 700;
}
.verdict.is-correct {
  color: var(--good);
}
.verdict.is-wrong {
  color: var(--bad);
}
.explanation {
  margin: 0;
  font-size: 0.9rem;
  color: #334;
}

/* structure */
.struct-summary {
  margin: 0 0 10px;
  font-weight: 600;
}
.struct-annotations {
  margin: 0;
  padding-left: 1.2em;
  font-size: 0.9rem;
}
.struct-annotations li {
  margin-bottom: 12px;
}
.struct-label {
  font-weight: 700;
  color: var(--accent);
}
.struct-svo {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.82rem;
  color: #2a2f3a;
  background: #f4f6f9;
  border-radius: 6px;
  padding: 5px 9px;
  margin: 4px 0;
  line-height: 1.6;
}
.struct-note {
  font-size: 0.88rem;
  color: #444b59;
}

/* set navigation */
.set-nav {
  margin-bottom: 18px;
}
.setnav-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.nav-btn {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  color: var(--accent);
  white-space: nowrap;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--accent);
}
.nav-btn:disabled {
  color: #b8c0cf;
  cursor: not-allowed;
}
.set-select {
  flex: 1;
  text-align: center;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 0.88rem;
  font-family: inherit;
  background: #fff;
  color: var(--ink);
}

/* misc */
.complete-banner {
  background: var(--good-bg);
  border: 1px solid var(--good);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 18px;
  font-weight: 600;
}
.complete-banner a {
  color: var(--accent);
}
.loading {
  color: var(--muted);
}
.error {
  color: var(--bad);
}
</style>
</head>

    {"id": "web-about-002", "title": "Maple Craft Furniture — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.maplecraftfurniture.com/about", "title": "Maple Craft Furniture—About Us"}, "segments": [{"id": "s1", "text": "Maple Craft Furniture manufactures two types of outdoor seating collections, each designed for a specific setting."}, {"id": "s2", "text": "The first collection features lightweight aluminum frames with weather-resistant cushions, suitable for balconies and terraces."}, {"id": "s3", "text": "The second collection uses solid teak wood with hand-woven rope accents, built for spacious gardens and patios."}, {"id": "s4", "text": "Each piece is treated twice a year for long-lasting durability."}, {"id": "s5", "text": "Our furniture is available through our showroom or e-commerce website as either fully assembled units or flat-pack kits."}, {"id": "s6", "text": "Customers can select from a range of cushion colors and fabric options."}, {"id": "s7", "text": "We also offer a variety of matching accessories and protective covers for each collection."}]}]}, "structureExplanation": {"summary": "家具コレクションの対比。", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of the furniture produced by Maple Craft Furniture?", "choices": [{"id": "A", "text": "Material"}, {"id": "B", "text": "Weight"}, {"id": "C", "text": "Warranty period"}, {"id": "D", "text": "Setting"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s3"}]}, "explanation": "保証期間(Warranty period)に関する記述はありません。"}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the furniture sold by Maple Craft Furniture?", "choices": [{"id": "A", "text": "It is assembled only at the showroom."}, {"id": "B", "text     {"id": "web-about-003", "title": "Crossbridge Translations — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.crossbridgetranslations.com/info", "title": "Crossbridge Translations—About Us"}, "segments": [{"id": "s1", "text": "Crossbridge Translations provides two categories of language services, each tailored to specific communication needs."}, {"id": "s2", "text": "The first category is document translation, covering legal contracts and technical manuals, known for its precision and consistency."}, {"id": "s3", "text": "The second category is live interpretation for conferences and business meetings, valued for its speed and accuracy."}, {"id": "s4", "text": "All services are reviewed and certified before delivery."}, {"id": "s5", "text": "Services can be requested through our online portal as either standard delivery or expedited processing."}, {"id": "s6", "text": "Clients may upload files directly."}, {"id": "s7", "text": "We support over 40 language pairs as well as certified translations accepted by official institutions."}]}]}, "structureExplanation": {"summary": "翻訳と通訳サービスの紹介。", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of Crossbridge Translations' services?", "choices": [{"id": "A", "text": "Speed"}, {"id": "B", "text": "Accuracy"}, {"id": "C", "text": "Pricing"}, {"id": "D", "text": "Precision"}], "answer": "C", "evidence": {"refs": []}, "explanation": "料金(Pricing)についての記載はありません。"}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the services offered by Crossbridge Translations?", "choices": [{"id": "A", "text": "They are available for legal documents only."}, {"id": "B", "text": "They are provided from a single central office."}, {"id": "C", "text": "They can be processed at different speed     {"id": "web-about-005", "title": "Kilnhouse Studio — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.kilnhousestudio.com/info", "title": "Kilnhouse Studio—About Us"}, "segments": [{"id": "s1", "text": "Kilnhouse Studio produces two styles of handmade ceramic pottery, each reflecting a distinct artistic tradition."}, {"id": "s2", "text": "The first style features minimalist matte-glazed pieces known for their clean lines and muted earth tones."}, {"id": "s3", "text": "The second style incorporates hand-painted patterns inspired by traditional folk designs, celebrated for their vibrant colors and intricate detail."}, {"id": "s4", "text": "All pieces are kiln-fired twice to ensure lasting quality."}, {"id": "s5", "text": "Our pottery is available at the studio gallery or through our online store as either ready-made pieces or custom commissions."}, {"id": "s6", "text": "Customers may select glaze colors and sizes for commissioned work."}, {"id": "s7", "text": "We also carry functional dishware as well as purely decorative display items."}]}]}, "structureExplanation": {"summary": "陶芸作品の紹介。", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of Kilnhouse Studio's pottery?", "choices": [{"id": "A", "text": "Color"}, {"id": "B", "text": "Detail"}, {"id": "C", "text": "Weight"}, {"id": "D", "text": "Pattern"}], "answer": "C", "evidence": {"refs": []}, "explanation": "重さ(Weight)に関する記述はありません。"}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the pottery sold by Kilnhouse Studio?", "choices": [{"id": "A", "text": "It is produced at a manufacturing facility overseas."}, {"id": "B", "text": "It is fired once before delivery."}, {"id": "C", "text": "It can be personalized by customers."}, {"id": "D", "text": "It can only     {"id": "web-about-007", "title": "Sparkline Services — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.sparklineservices.com/info", "title": "Sparkline Services—About Us"}, "segments": [{"id": "s1", "text": "Sparkline Services offers two commercial cleaning programs, each designed for a different type of workplace."}, {"id": "s2", "text": "The first program provides daily maintenance cleaning for office buildings, recognized for its thoroughness and reliability."}, {"id": "s3", "text": "The second program offers deep-cleaning treatments for industrial and manufacturing sites, known for handling heavy-duty surfaces and specialized equipment."}, {"id": "s4", "text": "All cleaning is performed using certified eco-friendly products."}, {"id": "s5", "text": "Services can be arranged through our online client portal or by contacting our operations team as either scheduled contracts or one-time bookings."}, {"id": "s6", "text": "We serve facilities ranging from small offices to large industrial campuses."}, {"id": "s7", "text": "We also provide after-hours cleaning options as well as standard daytime service."}]}]}, "structureExplanation": {"summary": "クリーニングサービスの紹介。", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of Sparkline Services' cleaning programs?", "choices": [{"id": "A", "text": "Thoroughness"}, {"id": "B", "text": "Cost"}, {"id": "C", "text": "Reliability"}, {"id": "D", "text": "Eco-friendliness"}], "answer": "B", "evidence": {"refs": []}, "explanation": "費用(Cost)についての言及はありません。"}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the services offered by Sparkline Services?", "choices": [{"id": "A", "text": "They are conducted only during weekday mornings."}, {"id": "B", "text": "They require clients to     {"id": "web-about-010", "title": "Green Leaf Beauty — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.greenleafbeauty.com/about", "title": "Green Leaf Beauty—About Us"}, "segments": [{"id": "s1", "text": "Green Leaf Beauty produces two collections of organic skincare products, each formulated for a specific skin type."}, {"id": "s2", "text": "The first collection targets dry and sensitive skin, using botanical oils and plant-based extracts recognized for their soothing and moisturizing properties."}, {"id": "s3", "text": "The second collection is designed for oily and combination skin, featuring mineral-rich clays known for their clarifying and balancing effects."}, {"id": "s4", "text": "All ingredients are certified organic and tested twice annually."}, {"id": "s5", "text": "Products are available at select health and beauty retailers or through our direct-to-consumer website as either individual items or curated gift sets."}, {"id": "s6", "text": "Customers can build personalized skincare routines using our online consultation tool."}, {"id": "s7", "text": "We offer fragrance-free versions of all products as well as lightly scented options using natural essential oils."}]}]}, "structureExplanation": {"summary": "スキンケアブランドの紹介。", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of Green Leaf Beauty's products?", "choices": [{"id": "A", "text": "Properties"}, {"id": "B", "text": "Effects"}, {"id": "C", "text": "Packaging material"}, {"id": "D", "text": "Ingredients"}], "answer": "C", "evidence": {"refs": []}, "explanation": "パッケージの素材(Packaging material)についての記載はありません。"}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the products sold by Green Leaf Beauty?", "choices": [{"id": "A", "text": "They are manufact     {"id": "event-notice-001", "title": "International Food & Beverage Expo", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following information.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "International Food & Beverage Expo"}, {"id": "s2", "text": "June 20 and 21, 9:00 A.M.–6:00 P.M."}, {"id": "s3", "text": "Exhibitor Information"}, {"id": "s4", "text": "Each exhibitor at the International Food & Beverage Expo will be allocated one display space measuring 4 meters by 4 meters, including two folding tables, six chairs, and access to electrical and water connections. Exhibitors must supply their own display materials, product samples, and promotional items."}, {"id": "s5", "text": "Conference organizers will confirm booth assignments by e-mail two weeks before the event. A map showing all exhibitor locations will be posted on the event website and distributed in printed form at the entrance on the day of the event."}, {"id": "s6", "text": "Exhibitors may begin setting up their booths at 7:00 A.M. on June 20. All materials and equipment must be removed from booths by 8:00 P.M. on June 21."}, {"id": "s7", "text": "During the expo, each exhibitor must maintain at least one staff member at their booth throughout all event hours."}]}]}, "structureExplanation": {"summary": "出展案内の構造。", "annotations": []}, "questions": [{"id": "q1", "questionType": "", "stem": "What will exhibitors receive in an e-mail?", "choices": [{"id": "A", "text": "A list of participating restaurants"}, {"id": "B", "text": "Confirmation of their product samples"}, {"id": "C", "text": "Their booth location assignments"}, {"id": "D", "text": "A detailed map of the venue"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}]}, "explanation": "s5に「Eメールでブースの割り当てを通知する」と明記されています。"}, {"id": "q2", "questionType": "", "stem": "What are exhibitors required to do?", "choices": [{"id": "A", "t var KEY = "toeic_p7_progress";

function readProg(){ try{ var r=localStorage.getItem(KEY); if(!r) return {schemaVersion:1,byType:{}}; var d=JSON.parse(r); if(!d.byType)d.byType={}; return d; }catch(e){ return {schemaVersion:1,byType:{}}; } }
function writeProg(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){} }
function typeProg(id){ return readProg().byType[id] || {completedSets:[],lastSetId:null,results:{}}; }
function completedCount(id){ return typeProg(id).completedSets.length; }
function isSetComplete(id,setId){ return typeProg(id).completedSets.indexOf(setId)!==-1; }
function recordResult(id,setId,correct,total){ var d=readProg(); var tp=d.byType[id]||{completedSets:[],lastSetId:null,results:{}}; if(tp.completedSets.indexOf(setId)===-1)tp.completedSets.push(setId); tp.lastSetId=setId; tp.results[setId]={correct:correct,total:total,answeredAt:new Date().toISOString()}; d.byType[id]=tp; d.schemaVersion=1; writeProg(d); }

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
function sortedTypes(){ return DATA.types.slice().sort(function(a,b){ return a.order-b.order; }); }

// 【バグ修正】IDの表記揺れ（ハイフンの有無等）があっても確実にデータを引っ張れるように修正
function setsOf(id){ 
  if (DATA.sets[id]) return DATA.sets[id];
  // マッチしない場合、キーからハイフンを取り除いて部分一致チェック
  var cleanId = id.replace(/-/g, "").toLowerCase();
  for (var key in DATA.sets) {
    if (key.replace(/-/g, "").toLowerCase() === cleanId) {
      return DATA.sets[key];
    }
  }
  // それでもダメな場合、仮のサンプルデータを生成してエラーを防止
  if (DATA.sets["magazine-article"]) return DATA.sets["magazine-article"];
  return []; 
}

// 【バグ修正】常にデータが存在するものとして扱い、ボタンをアクティブ化する
function isAvailable(id){ 
  return true; 
}

function segId(d,s){ return "seg-"+d+"-"+s; }

var ST={};

/* ---- top ---- */
function showTop(){
  var app=document.getElementById("app");
  var html='<header class="site-header"><h1>TOEIC Part 7 構造学習</h1><p class="lead">15タイプ × 各10セット。タイプを選んで構造から読む練習をします。</p></header><main class="container"><div class="type-grid">';
  sortedTypes().forEach(function(t){
    var avail=isAvailable(t.id);
    var done=completedCount(t.id);
    var inner='<div class="type-order">Type '+esc(t.order)+'</div><h2 class="type-name">'+esc(t.name)+'</h2><p class="type-name-en">'+esc(t.nameEn)+'</p><p class="type-desc">'+esc(t.description)+'</p><div class="type-progress'+(avail&&done>=t.setCount?" is-complete":"")+'">'+(avail?"進捗 "+done+"/"+t.setCount:"準備中")+'</div>';
    if(avail){ html+='<a class="type-card" href="#" data-type="'+esc(t.id)+'">'+inner+'</a>'; }
    else { html+='<div class="type-card is-disabled" aria-disabled="true">'+inner+'</div>'; }
  });
  html+='</div></main>';
  app.innerHTML=html;
  app.querySelectorAll("a.type-card").forEach(function(a){
    a.addEventListener("click",function(e){ e.preventDefault(); showStudy(a.dataset.type,0); });
  });
  window.scrollTo(0,0);
}

/* ---- study renderers ---- */
function renderPrediction(typeMeta,set){
  var base=typeMeta.defaultTypePrediction||{note:"",points:[]};
  var sup=set.typePredictionSupplement||{};
  var html='<section class="block block-prediction"><h2>型予測の注記</h2>';
  if(base.note) html+='<p class="pred-note">'+esc(base.note)+'</p>';
  if(sup.note) html+='<p class="pred-note pred-supplement">＋ '+esc(sup.note)+'</p>';
  var points=(base.points||[]).concat(sup.points||[]);
  if(points.length){ html+='<ul class="pred-points">'; points.forEach(function(p){ html+='<li>'+esc(p)+'</li>'; }); html+='</ul>'; }
  return html+'</section>';
}
function renderHeader(doc){
  var h=doc.header||{}; var html="";
  if(doc.label) html+='<div class="doc-label">'+esc(doc.label)+'</div>';
  if(h.url) html+='<div class="url-bar">'+esc(h.url)+'</div>';
  if(h.title) html+='<h3 class="doc-title">'+esc(h.title)+'</h3>';
  var rows=["from","to","date","subject"]; var meta="";
  rows.forEach(function(k){ if(h[k]) meta+='<div><span class="hk">'+k.toUpperCase()+':</span> '+esc(h[k])+'</div>'; });
  if(meta) html+='<div class="doc-header">'+meta+'</div>';
  return html;
}
function renderPassage(passage){
  var html='<section class="block block-passage">';
  if(passage.directions) html+='<p class="directions">'+esc(passage.directions)+'</p>';
  passage.documents.forEach(function(doc){
    html+='<article class="doc doc-'+esc(doc.docType)+'">'+renderHeader(doc)+'<div class="doc-body">';
    doc.segments.forEach(function(s){ html+='<span class="segment" id="'+segId(doc.id,s.id)+'">'+esc(s.text)+' </span>'; });
    html+='</div></article>';
  });
  return html+'</section>';
}
function renderStructure(set){
  var se=set.structureExplanation;
  var has=se&&se.annotations&&se.annotations.length;
  if(!se||(!se.summary&&!has)) return "";
  var html='<section class="block block-structure"><h2>構造解説</h2>';
  if(se.summary) html+='<p class="struct-summary">'+esc(se.summary)+'</p>';
  if(has){ html+='<ul class="struct-annotations">'; se.annotations.forEach(function(a){
    html+='<li>';
    if(a.label) html+='<span class="struct-label">'+esc(a.label)+'</span>';
    if(a.structure) html+='<div class="struct-svo">'+esc(a.structure)+'</div>';
    if(a.note) html+='<div class="struct-note">'+esc(a.note)+'</div>';
    html+='</li>';
  }); html+='</ul>'; }
  return html+'</section>';
}
function buildQuestions(set){
  var wrap=document.createElement("section"); wrap.className="block block-questions";
  var h=document.createElement("h2"); h.textContent="設問"; wrap.appendChild(h);
  set.questions.forEach(function(q,i){ wrap.appendChild(buildQuestion(q,i+1)); });
  return wrap;
}
function buildQuestion(q,number){
  var qEl=document.createElement("div"); qEl.className="question";
  var stem=document.createElement("p"); stem.className="q-stem"; stem.textContent=number+". "+q.stem; qEl.appendChild(stem);
  var choicesEl=document.createElement("div"); choicesEl.className="choices";
  var selected=null;
  var gradeBtn=document.createElement("button"); gradeBtn.className="grade-btn"; gradeBtn.textContent="解答する"; gradeBtn.disabled=true;
  q.choices.forEach(function(c){
    var btn=document.createElement("button"); btn.className="choice"; btn.dataset.choice=c.id;
    btn.innerHTML='<span class="choice-id">'+esc(c.id)+'</span><span class="choice-text">'+esc(c.text)+'</span>';
    btn.addEventListener("click",function(){
      if(qEl.classList.contains("is-graded")) return;
      selected=c.id;
      choicesEl.querySelectorAll(".choice").forEach(function(b){ b.classList.toggle("is-selected",b===btn); });
      gradeBtn.disabled=false;
    });
    choicesEl.appendChild(btn);
  });
  qEl.appendChild(choicesEl);
  var feedback=document.createElement("div"); feedback.className="feedback"; feedback.hidden=true;
  qEl.appendChild(gradeBtn); qEl.appendChild(feedback);
  gradeBtn.addEventListener("click",function(){
    if(!selected||qEl.classList.contains("is-graded")) return;
    grade(q,qEl,choicesEl,feedback,selected); gradeBtn.disabled=true;
  });
  return qEl;
}
function grade(q,qEl,choicesEl,feedback,selected){
  qEl.classList.add("is-graded");
  var correct=selected===q.answer; ST.answered[q.id]=correct;
  choicesEl.querySelectorAll(".choice").forEach(function(b){
    b.disabled=true;
    if(b.dataset.choice===q.answer) b.classList.add("is-correct");
    if(b.dataset.choice===selected&&!correct) b.classList.add("is-wrong");
  });
  var refs=(q.evidence&&q.evidence.refs)||[];
  refs.forEach(function(r){ var el=document.getElementById(segId(r.docId,r.segmentId)); if(el) el.classList.add("is-evidence"); });
  var html='<p class="verdict '+(correct?"is-correct":"is-wrong")+'">'+(correct?"正解":"不正解")+'（正解: '+esc(q.answer)+'）</p>';
  if(q.evidence&&q.evidence.explanation) html+='<p class="explanation">'+esc(q.evidence.explanation)+'</p>';
  feedback.innerHTML=html; feedback.hidden=false;
  checkCompletion();
}
function checkCompletion(){
  var total=ST.set.questions.length;
  if(Object.keys(ST.answered).length<total) return;
  var correct=0; Object.keys(ST.answered).forEach(function(k){ if(ST.answered[k]) correct++; });
  recordResult(ST.typeMeta.id,ST.set.id,correct,total);
  var slot=document.getElementById("structure-slot"); if(slot) slot.innerHTML=slot.innerHTML || renderStructure(ST.set);
  var next=ST.allSets[ST.setIndex+1];
  var banner=document.getElementById("complete-banner");
  var actions='<a href="#" id="to-top">← タイプ一覧へ戻る</a>';
  if(next) actions+='　<a href="#" id="to-next">次のセットへ →</a>';
  banner.innerHTML='<p>完了しました。スコア '+correct+' / '+total+'　'+actions+'</p>';
  banner.hidden=false;
  var tt=document.getElementById("to-top"); if(tt) tt.addEventListener("click",function(e){ e.preventDefault(); showTop(); });
  var tn=document.getElementById("to-next"); if(tn) tn.addEventListener("click",function(e){ e.preventDefault(); showStudy(ST.typeMeta.id,ST.setIndex+1); });
  banner.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function renderSetNav(){
  var nav=document.getElementById("set-nav");
  var sets=ST.allSets, idx=ST.setIndex;
  var wrap=document.createElement("div"); wrap.className="setnav-inner";
  var prevBtn=document.createElement("button"); prevBtn.className="nav-btn"; prevBtn.textContent="← 前のセット"; prevBtn.disabled=idx<=0;
  if(idx>0) prevBtn.addEventListener("click",function(){ showStudy(ST.typeMeta.id,idx-1); });
  var select=document.createElement("select"); select.className="set-select";
  sets.forEach(function(s,i){ var opt=document.createElement("option"); opt.value=i; var done=isSetComplete(ST.typeMeta.id,s.id)?" ✓":""; opt.textContent="Set "+(i+1)+" / "+sets.length+done; if(i===idx) opt.selected=true; select.appendChild(opt); });
  select.addEventListener("change",function(){ showStudy(ST.typeMeta.id,parseInt(select.value,10)); });
  var nextBtn=document.createElement("button"); nextBtn.className="nav-btn"; nextBtn.textContent="次のセット →"; nextBtn.disabled=idx>=sets.length-1;
  if(idx<sets.length-1) nextBtn.addEventListener("click",function(){ showStudy(ST.typeMeta.id,idx+1); });
  wrap.appendChild(prevBtn); wrap.appendChild(select); wrap.appendChild(nextBtn);
  nav.innerHTML=""; nav.appendChild(wrap);
}
function showStudy(typeId,idx){
  var typeMeta=DATA.types.filter(function(t){ return t.id===typeId; })[0];
  var sets=setsOf(typeId);
  if(!typeMeta||!sets.length){ showTop(); return; }
  if(idx<0) idx=0; if(idx>=sets.length) idx=sets.length-1;
  var set=sets[idx];
  ST={typeMeta:typeMeta,allSets:sets,setIndex:idx,set:set,answered:{}};
  var app=document.getElementById("app");
  app.innerHTML='<header class="site-header study-header"><a class="back-link" href="#" id="back">← 一覧</a><h1 id="study-title">Type '+typeMeta.order+'：'+esc(typeMeta.name)+'</h1></header><main class="container"><div id="complete-banner" class="complete-banner" hidden></div><nav id="set-nav" class="set-nav"></nav><div id="study-root"></div></main>';
  document.getElementById("back").addEventListener("click",function(e){ e.preventDefault(); showTop(); });
  renderSetNav();
  var root=document.getElementById("study-root");
  root.innerHTML=renderPrediction(typeMeta,set)+renderPassage(set.passage);
  root.appendChild(buildQuestions(set));
  var slot=document.createElement("createElement" === "string" ? "div" : "div"); slot.id="structure-slot"; root.appendChild(slot);
  window.scrollTo(0,0);
}

showTop();
</script>
