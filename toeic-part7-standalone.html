roperty team"}, {"id": "C", "text": "To inquire about an unexpected shipping fee"}, {"id": "D", "text": "To report that a hotel's camera equipment was damaged"}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "s4の This outstanding display of service ... が示すとおり、メールの目的はカメラ回収を助けたホテル従業員への感謝＝Q3正解。"}}, {"id": "q4", "questionType": "", "stem": "When did Mr. Delacroix depart for the eastern townships?", "choices": [{"id": "A", "text": "On February 4"}, {"id": "B", "text": "On February 5"}, {"id": "C", "text": "On February 9"}, {"id": "D", "text": "On February 10"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s10"}, {"docId": "doc1", "segmentId": "s11"}, {"docId": "doc2", "segmentId": "s4"}], "explanation": "クロス計算：doc1 s10–s11 で通関日は2月9日。doc2 s4 で『通関と同じ日に受領し、翌朝(the following morning)に出発』。2月9日＋1日＝2月10日＝Q4正解 On February 10。"}}, {"id": "q5", "questionType": "vocabulary", "stem": "In the e-mail, the word \"outstanding\" in paragraph 4, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "pending"}, {"id": "B", "text": "exceptional"}, {"id": "C", "text": "routine"}, {"id": "D", "text": "overdue"}], "answer": "B", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "doc2 s4の outstanding は『傑出した』の意。正解は exceptional。"}}]}, {"id": "customs-email-002", "title": "INTERNATIONAL SHIPPING DECLARATION", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following form and e-mail.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "INTERNATIONAL SHIPPING DECLARATION"}, {"id": "s2", "text": "Origin: Zurich, CH     Shipping Date: 12 September"}, {"id": "s3", "text": "FROM: Rolf Steinmann"}, {"id": "s4", "text": "The Bahnhof Grand Hotel"}, {"id": "s5", "text": "5 Bahnhofstrasse"}, {"id": "s6", "text": "Zurich, Switzerland"}, {"id": "s7", "text": "TO:"}, {"id": "s8", "text": "Contents: Valden Audio Headphones Model H9   Qty: 1   Weight: 0.9 kg"}, {"id": "s9", "text": "Postage Fee: $4,800.00"}, {"id": "s10", "text": "Customs Status: Cleared Korea Customs"}, {"id": "s11", "text": "16 September"}, {"id": "s12", "text": "Declaration: I certify that the information on this form is correct and that the package does not contain dangerous or prohibited items."}, {"id": "s13", "text": "Exporter's Signature: Rolf Steinmann"}]}, {"id": "doc2", "docType": "email", "label": "E-mail", "header": {"to": "Rolf Steinmann <rolf.steinmann@bahnhofgrandhotel.ch>", "from": "Yuna Park <yuna.park@sounddirectors.co.kr>", "date": "19 September", "subject": "Recovered headphones"}, "segments": [{"id": "s1", "text": "Dear Mr. Steinmann,"}, {"id": "s2", "text": "I stayed at the Bahnhof Grand Hotel in Zurich from 10 to 11 September while attending an international audio production conference. After checking out the next morning, I discovered that I had accidentally left my professional studio headphones in my room. I believe I had set them on the nightstand and simply forgot them in my rush to reach the airport."}, {"id": "s3", "text": "I was due to begin a major studio recording session in Seoul the day after my return, and I desperately needed the headphones since I use them exclusively for all my professional mixing and mastering work."}, {"id": "s4", "text": "I contacted the hotel by phone from the airport and was promptly connected to the guest services coordinator. He arranged for the headphones to be carefully packed and shipped to my studio address via expedited service. I received them the same day they cleared customs, and I was able to begin the recording session on time. This level of responsiveness truly reflects the exceptional service I have consistently experienced at Bahnhof Grand Hotel, and it is why I continue to choose your property for my visits to Switzerland."}, {"id": "s5", "text": "Sincerely,"}, {"id": "s6", "text": "Yuna Park"}, {"id": "s7", "text": "Audio Producer, Sound Directors Korea"}]}]}, "structureExplanation": {"summary": "申告書＋メールの定型。クロスQ4は通関日(s10–s11)＋1日。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s8"}], "label": "申告書：内容物", "note": "Contents: Valden Audio Headphones → Q1。"}, {"refs": [{"docId": "doc1", "segmentId": "s10"}, {"docId": "doc1", "segmentId": "s11"}], "label": "申告書：通関日", "note": "Cleared Korea Customs / 16 September。Q4クロス計算の起点。"}, {"refs": [{"docId": "doc2", "segmentId": "s4"}], "label": "メール：お礼＋行動（クロス＆語彙）", "note": "guest services coordinator が手配（Q2：Mr. Steinmann＝ホテル管理職）。received them the same day they cleared customs ... begin the recording session（Q4：9月16日＋1日＝9月17日）。level of responsiveness（Q3お礼／Q5語彙）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is suggested on the form?", "choices": [{"id": "A", "text": "The item exceeded a declared value limit."}, {"id": "B", "text": "The package was shipped from Korea."}, {"id": "C", "text": "The package contained audio equipment."}, {"id": "D", "text": "The item included prohibited materials."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s8"}], "explanation": "doc1 s8の Contents: Valden Audio Headphones が Q1正解の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Mr. Steinmann?", "choices": [{"id": "A", "text": "He is the hotel's guest services coordinator."}, {"id": "B", "text": "He recently purchased studio headphones."}, {"id": "C", "text": "He works for an electronics export company."}, {"id": "D", "text": "He is a customs official in Switzerland."}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s1"}, {"docId": "doc2", "segmentId": "s4"}], "explanation": "メールは Mr. Steinmann 宛(s1)、s4の手配した管理職への感謝＝Q2正解 He is the manager of the hotel。"}}, {"id": "q3", "questionType": "", "stem": "Why did Ms. Park write the e-mail?", "choices": [{"id": "A", "text": "To thank a hotel employee for returning her equipment"}, {"id": "B", "text": "To report lost equipment to Swiss authorities"}, {"id": "C", "text": "To ask about an unexpected international shipping charge"}, {"id": "D", "text": "To report damage to her equipment during shipping"}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "s4の感謝表現から、メールの目的は迅速対応への感謝＝Q3正解。"}}, {"id": "q4", "questionType": "", "stem": "When did Ms. Park begin her recording session?", "choices": [{"id": "A", "text": "On September 10"}, {"id": "B", "text": "On September 12"}, {"id": "C", "text": "On September 16"}, {"id": "D", "text": "On September 17"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s10"}, {"docId": "doc1", "segmentId": "s11"}, {"docId": "doc2", "segmentId": "s4"}], "explanation": "クロス計算：通関日9月16日(s10–s11)＋翌朝開始(s4)＝9月17日＝Q4正解 On September 17。"}}, {"id": "q5", "questionType": "vocabulary", "stem": "In the e-mail, the word \"responsiveness\" in paragraph 4, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "calmness"}, {"id": "B", "text": "quickness in replying"}, {"id": "C", "text": "dedication to quality"}, {"id": "D", "text": "level of experience"}], "answer": "B", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "doc2 s4の responsiveness（迅速な対応）の同義語を選ぶ語彙問題。"}}]}, {"id": "customs-email-003", "title": "INTERNATIONAL SHIPPING DECLARATION", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following form and e-mail.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "INTERNATIONAL SHIPPING DECLARATION"}, {"id": "s2", "text": "Origin: Singapore, SG     Shipping Date: 18 April"}, {"id": "s3", "text": "FROM: Mei Lin Tan"}, {"id": "s4", "text": "The Orchid Bay Hotel"}, {"id": "s5", "text": "7 Marina Boulevard"}, {"id": "s6", "text": "Singapore 018984"}, {"id": "s7", "text": "TO:"}, {"id": "s8", "text": "Contents: Spectra Medical Tablet Model MT4   Qty: 1   Weight: 1.6 kg"}, {"id": "s9", "text": "Postage Fee: $5,400.00"}, {"id": "s10", "text": "Customs Status: Cleared NZ Customs"}, {"id": "s11", "text": "22 April"}, {"id": "s12", "text": "Declaration: I certify that the information on this form is correct and that the package does not contain dangerous or prohibited items."}, {"id": "s13", "text": "Exporter's Signature: Mei Lin Tan"}]}, {"id": "doc2", "docType": "email", "label": "E-mail", "header": {"to": "Mei Lin Tan <mlt@orchidbayhotel.sg>", "from": "Dr. Priya Sharma <p.sharma@aucklandmedpartners.co.nz>", "date": "25 April", "subject": "Returned medical tablet"}, "segments": [{"id": "s1", "text": "Dear Ms. Tan,"}, {"id": "s2", "text": "I was a guest at the Orchid Bay Hotel in Singapore from 16 to 17 April, where I was attending a regional medical technology conference. Upon arriving at Auckland Airport, I realized I had left my medical data tablet in the hotel room — I believe I had placed it under the mattress for security and completely forgotten it."}, {"id": "s3", "text": "I was due to run a clinical data presentation workshop for my colleagues the morning after my return, and I urgently needed the tablet because all my session materials and patient case studies are stored exclusively on it."}, {"id": "s4", "text": "I immediately called the hotel from the arrivals hall and was directed to the duty manager. She personally ensured the tablet was packed securely and arranged for it to be dispatched via the fastest available courier service. It arrived at my clinic on the day customs clearance was completed, and I was able to conduct the workshop as planned the following morning. The speed and care with which the team handled the situation is a true reflection of the Orchid Bay Hotel's exceptional service culture, and I will certainly stay with you again on future trips to Singapore."}, {"id": "s5", "text": "Sincerely,"}, {"id": "s6", "text": "Dr. Priya Sharma"}, {"id": "s7", "text": "Clinical Associate, Auckland Medical  and that the package does not contain dangerous or prohibited items."}, {"id": "s13", "text": "Exporter's Signature: Keiko Watanabe"}]}, {"id": "doc2", "docType": "email", "label": "E-mail", "header": {"to": "Keiko Watanabe <k.watanabe@imperialpalacehotel.jp>", "from": "Dr. Samuel Obi <s.obi@lagosresearchinstitute.ng>", "date": "12 October", "subject": "Recovered microscope"}, "segments": [{"id": "s1", "text": "Dear Ms. Watanabe,"}, {"id": "s2", "text": "I was a guest at the Imperial Palace Hotel in Tokyo from 1 to 2 October while presenting at a biomedical research conference. After my departure, I discovered at the airport that I had left my portable research microscope in the hotel room — it had been on the desk near the window, and I overlooked it completely while packing."}, {"id": "s3", "text": "I was scheduled to begin a critical lab analysis series at our Lagos institute the morning after my return, and the microscope was essential since it contains proprietary calibration settings I rely on for all precision work."}, {"id": "s4", "text": "I telephoned the hotel from Narita Airport and was connected to the concierge manager. She immediately arranged for the microscope to be packed with professional care and shipped via expedited international courier. It arrived at my institute on the day customs clearance was confirmed, and I was able to begin the analysis series the following morning as planned. The swift and thoughtful response I received reflects everything I value about the Imperial Palace Hotel, and it remains my first choice whenever my research takes me to Japan."}, {"id": "s5", "text": "Sincerely,"}, {"id": "s6", "text": "Dr. Samuel Obi"}, {"id": "s7", "text": "Senior Researcher, Lagos Biomedical Research Institute"}]}]}, "structureExplanation": {"summary": "申告書＋メールの定型。クロスQ4は通関日(s10–s11)＋1日。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s10"}, {"docId": "doc1", "segmentId": "s11"}], "label": "申告書：通関日", "note": "Cleared Nigeria Customs ", "text": "To report a loss to hotel security"}, {"id": "C", "text": "To dispute a shipping cost"}, {"id": "D", "text": "To notify the hotel of damage during shipping"}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "s4の感謝表現から、目的は機器回収を助けたホテル従業員への感謝＝Q3正解。"}}, {"id": "q4", "questionType": "", "stem": "When did Mr. Nguyen conduct his recording session?", "choices": [{"id": "A", "text": "On August 8"}, {"id": "B", "text": "On August 9"}, {"id": "C", "text": "On August 13"}, {"id": "D", "text": "On August 14"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s10"}, {"docId": "doc1", "segmentId": "s11"}, {"docId": "doc2", "segmentId": "s4"}], "explanation": "クロス計算：通関日8月13日(s10–s11)＋翌朝の録音(s4)＝8月14日＝Q4正解 On August 14。"}}, {"id": "q5", "questionType": "vocabulary", "stem": "In the e-mail, the word \"efficiency\" in paragraph 4, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "enthusiasm"}, {"id": "B", "text": "reliability"}, {"id": "C", "text": "effectiveness"}, {"id": "D", "text": "helpfulness"}], "answer": "C", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "doc2 s4の efficiency（効率）の同義語を選ぶ語彙問題。"}}]}, {"id": "customs-email-009", "title": "INTERNATIONAL SHIPPING DECLARATION", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following form and e-mail.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "INTERNATIONAL SHIPPING DECLARATION"}, {"id": "s2", "text": "Origin: Nairobi, KE     Shipping Date: 16 May"}, {"id": "s3", "text": "FROM: Joyce Omuya"}, {"id": "s4", "text": "The Savanna Grand Hotel"}, {"id": "s5", "text": "15 Uhuru Highway"}, {"id": "s6", "text": "Nairobi, Kenya"}, {"id": "s7", "text": "TO:"}, {"id": "s8", "text": "Contents: FieldSurvey GPS Unit Model FS4   Qty: 1   Weight: 0.8 kg"}, {"id": "s9", "text": "Postage Fee: $5,100.00"}, {"id": "s10", "text": "Customs Status: Cleared Germany Customs"}, {"id": "s11", "text": "21 May"}, {"id": "s12", "text": "Declaration: I certify that the information on this form is correct and that the package does not contain dangerous or prohibited items."}, {"id": "s13", "text": "Exporter's Signature: Joyce Omuya"}]}, {"id": "doc2", "docType": "email", "label": "E-mail", "header": {"to": "Joyce Omuya <j.omuya@savannagrandhotel.ke>", "from": "Felix Hoffmann <f.hoffmann@berlintechmapping.de>", "date": "24 May", "subject": "Recovered GPS unit"}, "segments": [{"id": "s1", "text": "Dear Ms. Omuya,"}, {"id": "s2", "text": "I was a guest at The Savanna Grand Hotel in Nairobi from 14 to 15 May while participating in a land survey and geographic data conference. I left my professional GPS unit in the hotel safe when I checked out and only realized this after boarding at Jomo Kenyatta International Airport."}, {"id": "s3", "text": "I was due to begin a field mapping survey in the Berlin metropolitan area the day after arriving home, and the GPS unit was critical as it contains all of my project-specific coordinate data and calibration settings."}, {"id": "s4", "text": "I contacted the hotel by phone before my flight departed and was connected to the rooms division manager. She arranged for the GPS unit to be retrieved from the safe, carefully packaged, and dispatched via express international courier with insurance. I received it the same day it cleared German customs, and I was able to begin the field survey on schedule the following morning. The speed and professionalism of your team's response was truly remarkable, and I will not hesitate to stay at The Savanna Grand Hotel on future visits to Nairobi."}, {"id": "s5", "text": "Sincerely,"}, {"id": "s6", "text": "Felix Hoffmann"}, {"id": "s7", "text": "Senior Survey Engineer, Berlin Tech Mapping"}]}]}, "structureExplanation": {"summary": "申告書＋メールの定型。クロスQ4は通関日(s10–s11)＋1日。", "annotations": [{"refs": [{"docId": "doc1", "segmentId {"id": "doc2", "docType": "email", "label": "E-mail", "header": {"to": "Isabel Torres <i.torres@gothicquarterhotel.es>", "from": "Dr. Liam Murphy <l.murphy@dublinbrainresearch.ie>", "date": "9 October", "subject": "Recovered EEG device"}, "segments": [{"id": "s1", "text": "Dear Ms. Torres,"}, {"id": "s2", "text": "I was a guest at The Gothic Quarter Hotel in Barcelona from 30 September to 1 October while presenting at a neuroscience research symposium. I inadvertently left my portable EEG device in the hotel room's bathroom cabinet and only realized this mistake after reaching El Prat Airport."}, {"id": "s3", "text": "I was scheduled to begin a series of patient cognitive assessments at my Dublin clinic the morning after my return, and the EEG device was essential because it contains individualized patient recording profiles and calibration configurations for each participant."}, {"id": "s4", "text": "I contacted the hotel by mobile and was connected to the hotel director, who personally supervised the recovery of the device from the room and arranged for it to be packaged and shipped via the fastest available international courier. The device arrived at my clinic the same day it was cleared through Irish customs, and I was able to begin the patient assessments as planned the following morning. The level of care and professionalism demonstrated by your team was truly outstanding, and The Gothic Quarter Hotel will always be my choice when I attend conferences in Barcelona."}, {"id": "s5", "text": "Sincerely,"}, {"id": "s6", "text": "Dr. Liam Murphy"}, {"id": "s7", "text": "Neurologist, Dublin Brain Research Institute"}]}]}, "structureExplanation": {"summary": "申告書＋メールの定型。クロスQ4は通関日(s10–s11)＋1日。Q5(outstanding)は doc2 s4。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s10"}, {"docId": "doc1", "segmentId": "s11"}], "label": "申告書：通関日", "note": "Cleared Ireland Customs / 6 October。Q4クロス計算の起点。"}, {"refs": [{"docId": "doc2", "segmentId": "s4"}], "label": "メール：受領＋翌朝(クロス)", "note": "device arrived ... same day it was cleared through Irish customs ... begin the patient assessments ... the following morning（Q4：10月6日＋1日＝10月7日）。hotel director が手配（Q2）。outstanding（Q5語彙）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is suggested on the form?", "choices": [{"id": "A", "text": "The item was shipped from Ireland."}, {"id": "B", "text": "The package contained a medical device."}, {"id": "C", "text": "The item exceeded a declared weight."}, {"id": "D", "text": "The package included hazardous materials."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s8"}], "explanation": "doc1 s8の Contents: NeuroScan Portable EEG Device が Q1正解の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Ms. Torres?", "choices": [{"id": "A", "text": "She is the hotel director."}, {"id": "B", "text": "She recently purchased an EEG device."}, {"id": "C", "text": "She works for a medical equipment company."}, {"id": "D", "text": "She is a customs inspector in Spain."}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s1"}, {"docId": "doc2", "segmentId": "s4"}], "explanation": "メール宛先 Ms. Torres(s1)と、s4の手配した hotel director への感謝＝Q2正解 manager of the hotel。"}}, {"id": "q3", "questionType": "", "stem": "Why did Dr. Murphy write the e-mail?", "choices": [{"id": "A", "text": "To commend the hotel for recovering and shipping his device"}, {"id": "B", "text": "To report a missing item to the hotel's lost and found"}, {"id": "C", "text": "To challenge an unexpected customs fee"}, {"id": "D", "text": "To notify the hotel that his device arrived damaged"}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s4"}], "explanation": "s4の感謝表現から、目的はEEG機器回収を助けたホテル従業員への感謝＝Q3正解。"}}, {"id": "q4", "questionType": "", "stem": "When did Dr. Murphy begin his patient assessments?", "choices": [{"id": "A", "text": "On October 1"}, {"id": "B", "text": "On October 2"}, {"id": "C", "text": ansportation arrangements yet, but I'll keep you updated."}, {"id": "s5", "text": "Best,"}, {"id": "s6", "text": "Hector"}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.anaheimorthopedicsconference.org"}, "segments": [{"id": "s1", "text": "Anaheim Orthopedics Conference Event Calendar, April 9"}, {"id": "s2", "text": "Welcome 8:00 A.M.–8:45 A.M. (Presidential Room) Introductions and overview"}, {"id": "s3", "text": "Session 1: The Shoulder 9:00 A.M.–10:30 A.M. (Room 201)"}, {"id": "s4", "text": "Common injuries and exam techniques"}, {"id": "s5", "text": "Session 2: Splints and Casts 10:30 A.M.–12:00 noon (Room 202)"}, {"id": "s6", "text": "New approaches to stabilizing injured joints"}, {"id": "s7", "text": "Session 3: The Knee 1:30 P.M.–3:00 P.M. (Room 201)"}, {"id": "s8", "text": "Methods for identifying and treating ligament damage"}, {"id": "s9", "text": "Session 4: Exercises for Strength 3:00 P.M.–4:30 P.M. (Room 204)"}, {"id": "s10", "text": "Recommendations for physical activities for children and adults"}]}, {"id": "doc3", "docType": "email", "label": "E-mail", "header": {"to": "Hector Cho", "from": "Janice Aria", "date": "Friday, February 5", "subject": "RE: Anaheim conference"}, "segments": [{"id": "s1", "text": "Hector,"}, {"id": "s2", "text": "I like your suggestion of coordinating our conference attendance. I can create an informal sign-up document so that everyone can get an idea of what sessions are available and we can make sure we cover all of them."}, {"id": "s3", "text": "I appreciate the information from the Web site. I didn't know it was already available. I definitely want to attend the session on dealing with ligament injuries. Once we get the schedule for the additional conference sessions, I'll send it out to the team, together with the attendance sign-up sheet."}, {"id": "s4", "text": "It's great that you were able to get that group discount. Conferences like this are a big expense, but your ef xt": "From April 12 to April 26, training will be provided on transferring active work orders, equipment records, and maintenance histories to MaintainIT. All FacilityPro users must complete this migration before May 3, when FacilityPro will be shut down. Starting June 1, advanced MaintainIT training on preventive maintenance scheduling and asset lifecycle management will be offered. Please send any questions directly to my team."}, {"id": "s4", "text": "Best,"}, {"id": "s5", "text": "Clare Jensen"}, {"id": "s6", "text": "Facilities Operations Manager"}]}]}, "structureExplanation": {"summary": "", "annotations": []}, "questions": [{"id": "q1", "questionType": "", "stem": "According to the e-mail, why did the company choose MaintainIT over FacilityPro?", "choices": [{"id": "A", "text": "MaintainIT is less costly to operate."}, {"id": "B", "text": "MaintainIT is a newer system."}, {"id": "C", "text": "MaintainIT was preferred by the operations team."}, {"id": "D", "text": "MaintainIT offers better mobile access."}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q2", "questionType": "", "stem": "What will the April training sessions cover?", "choices": [{"id": "A", "text": "How to use preventive maintenance scheduling"}, {"id": "B", "text": "How to transfer work orders and equipment records to MaintainIT"}, {"id": "C", "text": "How to manage asset lifecycle reporting"}, {"id": "D", "text": "How to assign maintenance tasks to team members"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q3", "questionType": "", "stem": "What is the last date when FacilityPro will be operational?", "choices": [{"id": "A", "text": "April 7"}, {"id": "B", "text": "April 12"}, {"id": "C", "text": "April 26"}, {"id": "D", "text": "May 3"}], "answer": "D", "evidence": {"refs": [], "explanation": ""}}]}, {"id": "email-005", "title": "Research data management system upgrade", "difficulty": "standard", "passage": {"format": "single", "directions": " under and CEO Aaron Bright in a recent interview. \"We're ready to bring Oasis beers to communities that have been asking for them for a long time.\" — [4] —"}, {"id": "s7", "text": "Tours of the Denver facility will be available to the public starting October 1. Visit www.oasisbrewing.com for details."}]}]}, "structureExplanation": {"summary": "記事+文挿入の定型。Q2=準備期間中の並行実績(s3)、Q4=発言者の性別にHe/Sheを一致させ[4]。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：新動向", "note": "Following three years ... announced the opening of two new regional facilities。[1]を含む。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：詳細＋並行実績(推論の核)", "structure": "[S] The announcement / [V] came / [M] as welcome news ... / [M:理由] as Oasis has introduced four new seasonal beer varieties since its last major capacity expansion. — [2] —", "note": "Q1根拠：begin operations in September（秋に稼働）。Q2根拠：since its last major capacity expansion（前回拡張以降4種投入）→ expanded its product lineup before this announcement。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第3段落：役職者", "note": "chief operations officer, Petra Walsh が登場＝Q3根拠。[3]を含む。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第5段落：引用＋文挿入[4]", "structure": "\"Opening these two facilities is the culmination ...,\" said founder and CEO Aaron Bright in a recent interview. — [4] —", "note": "挿入文 He stated that ...。直前の発言者 Aaron Bright（男性）→ He が一致し[4]が正解。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about the new facilities?", "choices": [{"id": "A", "text": "They will replace two existing Oasis locations."}, {"id": "B", "text": "They will start operating in the fall."}, {"id": "C", "text": "They were funded by Mountain Ridge Beverages."}, {"id": "D", "text": "They are located in the same city."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の begin operations in September が Q1正解 start operating in the fall の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Oasis Brewing Co.?", "choices": [{"id": "A", "text": "It focuses exclusively on seasonal beer production."}, {"id": "B", "text": "It has not launched any new products in three years."}, {"id": "C", "text": "It expanded its product lineup during the period before this announcement."}, {"id": "D", "text": "It was founded three years ago in Portland."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の as Oasis has introduced four new seasonal beer varieties since its last major capacity expansion が Q2正解 expanded its product lineup during the period before this announcement の根拠。"}}, {"id": "q3", "questionType": "", "stem": "What is most likely true about Ms. Walsh?", "choices": [{"id": "A", "text": "She is the founder of Oasis Brewing Co."}, {"id": "B", "text": "She manages operations and logistics decisions."}, {"id": "C", "text": "She is a partner at Mountain Ridge Beverages."}, {"id": "D", "text": "She recently relocated to Denver."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s4"}], "explanation": "s4で chief operations officer, Petra Walsh と紹介される→Q3正解 manages operations and logistics decisions。"}}, {"id": "q4", "questionType": "", "stem": "In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong? \"He stated that the company has long anticipated the chance to reach new regional markets.\"", "choices": [{"id": "A", "text": "[1]"}, {"id": "B", "text": "[2]"}, {"id": "C", "text": "[3]"}, {"id": "D", "text": "[4]"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "挿入文の He は直前の発言者 Aaron Bright（男性）を受ける。s6の話者が Aaron Bright なので [4] が正解。"}}]}, {"id": "article-insertion-003", "title": "Solstice Architects Wins International Design Award", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-4 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Solstice Architects Wins International Design Award"}, {"id": "s2", "text": "BARCELONA (17 November)—After two years of recognition within the European architecture community, Solstice Architects has been awarded the prestigious Global Built Environment Prize for sustainable urban design. — [1] —"}, {"id": "s3", "text": "The award was presented at a ceremony in Barcelona, where Solstice's signature mixed-use development, the Canopy District in Amsterdam, was recognized as a landmark in sustainable community planning. Industry observers noted that Solstice has completed two additional award-nominated projects since the Canopy District's opening. — [2] —"}, {"id": "s4", "text": "Dutch urban planning agency CityForm will collaborate with Solstice on a new mixed-use waterfront development in Rotterdam. According to Solstice's managing partner, Yuki Morita, additional joint ventures with public institutions in Asia and the Middle East are under active discussion. — [3] —"}, {"id": "s5", "text": "Ms. Morita also indicated that Solstice plans to establish a new research and design studio in Singapore by next year."}, {"id": "s6", "text": "\"This recognition reflects years of deliberate work to put sustainability at the center of every project we take on,\" said lead architect Dan Rivera in a recent interview. \"We are designing cities for the people who will live in them for generations.\" — [4] —"}, {"id": "s7", "text": "Information about upcoming Solstice projects is available at www.solsticearchitects.com."}]}]}, "structureExplanation": {"summary": "記事+文挿入の定型。Q2=Canopy District開業以降の追加実績(s3)、Q4=発言者 Dan Rivera（男性）にHeを一致させ[4]。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：詳細＋並行実績(推論の核)", "note": "Q1根拠：Canopy District が the Global Built Environment Prize 受賞作と認識される。Q2根拠：Solstice has completed two additional award-nominated projects s  as GreenBridge's construction and installation partner. According to GreenBridge's community director, Anneke Smit, additional partnerships with local schools and food banks are being formalized. — [3] —"}, {"id": "s5", "text": "Ms. Smit also indicated that expansion into Belgium and Germany is planned for the following year."}, {"id": "s6", "text": "\"This network is the result of years of listening to what urban communities actually need from their food systems,\" said GreenBridge founder Pieter de Vries in a recent interview. \"We are giving cities the tools to grow their own food in ways that are practical, sustainable, and genuinely inclusive.\" — [4] —"}, {"id": "s7", "text": "Community membership information is available at www.greenbridge.nl from June 30."}]}]}, "structureExplanation": {"summary": "記事+文挿入の定型。Q2=パイロット期間中の地域連携と技術開発(s3)、Q4=発言者 Pieter de Vries（男性）にHeを一致させ[4]。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：新動向", "note": "Q1根拠：full-scale urban farming network ... starting with Amsterdam and Rotterdam（最初のサイト）。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：並行実績(推論の核)", "note": "Q2根拠：GreenBridge has signed up over 800 community members ... and developed three new crop cultivation techniques during its pilot phase → actively built community engagement and developed new techniques during its pilot period。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第5段落：引用＋文挿入[4]", "note": "挿入文 He added that ...。直前の発言者 founder Pieter de Vries（男性）→ He が一致し[4]が正解。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about the Amsterdam and Rotterdam sites?", "choices": [{"id": "A", "text": "They are the locations of GreenBridge's founding community gardens."}, {"id": "B", "text": "They will be the first full-scale network sites."}, {"id": "C", "text": "They will replace previously closed urban farms."}, {"id": "D", "text": "They are the largest vertical farming sites in Europe."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の full-scale urban farming network ... starting with Amsterdam and Rotterdam が Q1正解 first full-scale network sites の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about GreenBridge?", "choices": [{"id": "A", "text": "It focuses exclusively on rooftop gardening."}, {"id": "B", "text": "It has been inactive throughout the two-year pilot period."}, {"id": "C", "text": "It actively built community engagement and developed new techniques during its pilot period."}, {"id": "D", "text": "It was founded two years ago in Amsterdam."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の GreenBridge has signed up over 800 community members ... and developed three new crop cultivation techniques during its pilot phase が Q2正解 actively built community engagement and developed new techniques during its pilot period の根拠。"}}, {"id": "q3", "questionType": "", "stem": "What is most likely true about Ms. Smit?", "choices": [{"id": "A", "text": "She is the founder of UrbanGrow."}, {"id": "B", "text": "She manages GreenBridge's community and partnership activities."}, {"id": "C", "text": "She lives in Rotterdam."}, {"id": "D", "text": "She designed the vertical farming installations."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s4"}], "explanation": "s4で community director, Anneke Smit と紹介される→Q3正解 manages GreenBridge's community and partnership activities。"}}, {"id": "q4", "questionType": "", "stem": "In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong? \"He added that the network's model is designed to be replicable in any city with willing community partners.\"", "choices": [{"id": "A", "text": "[1]"}, {"id": "B", "text": "[2]"}, {"id": "C", "text": "[3]"}, {"id": "D", "text": "[4]"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "挿入文の He は直前の発言者 Pieter de Vries（男性）を受ける。s6の話者が Pieter de Vries なので [4] が正解。"}}]}, {"id": "article-insertion-010", "title": "Riverstone Publishing Launches New Imprint", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-4 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Riverstone Publishing Launches New Imprint"}, {"id": "s2", "text": "LONDON (15 January)—After two years of editorial planning and market analysis, Riverstone Publishing has announced the launch of a new imprint, Sandstone Books, dedicated exclusively to debut literary fiction from authors based in the Global South. — [1] —"}, {"id": "s3", "text": "Sandstone Books will launch with a debut list of six titles to be released simultaneously in September, with distribution rights secured for 35 countries across Europe, North America, and Asia. Publishing circles noted that Riverstone has successfully launched three other imprints and won multiple industry awards during its planning period. — [2] —"}, {"id": "s4", "text": "Independent literary agency TalesBridge will serve as the exclusive talent scout and literary representative for Sandstone authors in Africa and Latin America. According to Riverstone's editorial director, Priya Nair, additional agency partnerships covering South and Southeast Asia are being confirmed. — [3] —"}, {"id": "s5", "text": "Ms. Nair also confirmed that a dedicated Sandstone Books fellowship program for emerging writers will launch in 2025."}, {"id": "s6", "text": "\"Sandstone Books is our commitment to making sure the most important literary voices of our time have a platform that truly serves them,\" said Riverstone CEO Julian Hart in a recent interview. \"These are stories the world has not yet had the chance to read.\" — [4] —"}, {"id": "s7", "text": "Information about the Sandstone Books debut list will be available at www.riverstonePublishing.co.uk from February 1."}]}]}, "structureExplanation": {"summary": "記事+文挿入の定型。Q2=企画期間中の他インプリント立ち上げと受賞(s3)、Q4=発言者 Julian Hart（男性）にHeを一致させ[4]。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s3"}], "label": "第1〜2段落：新動向＋並行実績(推論の核)", "note": "Q1根拠：s2の debut literary fiction from authors based in the Global South ＋ s3の debut list of six titles。Q2根拠：s3の Riverstone has successfully launched three other imprints and won multiple industry awards during its planning period → continued to grow and receive recognition during the planning period。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第5段落：引用＋文挿入[4]", "note": "挿入文 He emphasized that ...。直前の発言者 CEO Julian Hart（男性）→ He が一致し[4]が正解。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about the September launch list?", "choices": [{"id": "A", "text": "It includes six debut novels from Global South authors."}, {"id": "B", "text": "It will be distributed in six countries only."}, {"id": "C", "text": "It includes reprints of previously published works."}, {"id": "D", "text": "It will be available only through online retailers."}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の debut list of six titles と s2の debut literary fiction from authors based in the Global South が Q1正解 six debut novels from Global South authors の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Riverstone Publishing?", "choices": [{"id": "A", "text": "It has never before launched a new imprint."}, {"id": "B", "text": "It has been inactive for two years."}, {"id": "C", "text": "It continued to grow and receive recognition during the planning period."}, {"id": "D", "text": "It was founded two years ago in London."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の Riverstone has successfully launched three other imprints and won multiple industry awards during its planning period が Q2正解 continued to grow and receive recognition during the planning period の根拠。"}}, {"id": "q3", "questionType": "", "stem": "What is most likely true about Ms. Nair?", "choices": [{"id": "A", "text": "She is the co-founder of TalesBridge."}, {"id": "B", "text": "She oversees Riverstone's editorial and acquisitions strategy."}, {"id": "C", "text": "She lives in Africa."}, {"id": "D", "text": "She co-authored one of the Sandstone debut titles."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s4"}], "explanation": "s4で editorial director, Priya Nair と紹介される→Q3正解 oversees Riverstone's editorial and acquisitions strategy。"}}, {"id": "q4", "questionType": "", "stem": "In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong? \"He emphasized that the imprint exists to amplify stories that deserve far wider global readership than they have traditionally received.\"", "choices": [{"id": "A", "text": "[1]"}, {"id": "B", "text": "[2]"}, {"id": "C", "text": "[3]"}, {"id": "D", "text": "[4]"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "挿入文の He は直前の発言者 Julian Hart（男性）を受ける。s6の話者が Julian Hart なので [4] が正解。"}}]}], "web-about": [{"id": "web-about-001", "title": "Meadow Blend Teas — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.meadowblendteas.com/info", "title": "Meadow Blend Teas—About Us"}, "segments": [{"id": "s1", "text": "Meadow Blend Teas produces two varieties of premium herbal tea, each known for its distinct characteristics.", "role": "overview"}, {"id": "s2", "text": "The first variety is made from dried chamomile and lavender, valued for its delicate floral aroma and calming properties." e peak freshness.", "note": "「twice a year（年に2回）」は、設問Q2のひっかけ選択肢（every two years＝2年に1回）を撃破するための絶対的防衛ライン。ensureは「～を確実にする・保証する」。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第5文", "structure": "[S] Our teas / [V] are / [C] available / [M] from our online shop / [M] as either loose-leaf or pre-packaged teabags.", "note": "「either A or B（AかBのどちらか）」の相関構文。茶葉のまま(loose-leaf)か個包装ティーバッグかの2形態を選べる構造が、設問Q2正解の multiple product forms（複数の製品形態）へ言い換えられる。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第6文", "structure": "[S] The teabags / [V] are designed / [M] for single-cup convenience.", "note": "be designed for ~（～のために設計されている／作られている）。"}, {"refs": [{"docId": "doc1", "segmentId": "s7"}], "label": "第7文", "structure": "[S] We / [V] offer / [O] a wide selection of blended flavors as well as single-herb teas / [関係詞節] that retain their natural taste.", "note": "「B as well as A（AだけでなくBも）」。thatは主格の関係代名詞で先行詞は single-herb teas。retain は「（本来の性質や味を）保持する」というパート7必須動詞。"}]}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of the teas produced at Meadow Blend Teas?", "choices": [{"id": "A", "text": "Aroma"}, {"id": "B", "text": "Flavor"}, {"id": "C", "text": "Price"}, {"id": "D", "text": "Properties"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s3"}], "explanation": "NOT問題。s1で2種類の対比を宣言し、s2に aroma と calming properties、s3に flavor が明示される。price はどこにも言及がないため C が正解。"}}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the teas sold by Meadow Blend Teas?", "choices": [{"id": "A", "text": "They are harvested every two years."}, {"id": "B", "text": "They are processed at a partner facility."}, {"id": "C", "text": "They are available in multiple product forms."}, {"id": "D", "text": "They can only be purchased at a physical store."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}, {"docId": "doc1", "segmentId": "s4" と全く同じ独立分詞構文の骨組み。settingは「環境、シチュエーション、設置場所」。"}, {"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第2文", "structure": "[S] The first collection / [V] features / [O] lightweight aluminum frames with weather-resistant cushions / [M] , [which are] suitable for balconies and terraces.", "note": "featureは「～を特徴とする、目玉とする」。形容詞 suitable の前には which are が省略。weather-resistant は「耐候性の、悪天候に強い」。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第3文", "structure": "[S] The second collection / [V] uses / [O] solid teak wood with hand-woven rope accents / [M] , [which is] built for spacious gardens and patios.", "note": "「, built for ~」は過去分詞句による後置修飾。spacious（広々とした）、patio（中庭、テラス）。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第4文", "structure": "[S] Each piece / [V] is treated / [M] twice a year / [M] for long-lasting durability.", "note": "treatはこの文脈では「（木材や金属に特殊な加工や手入れを）施す、処理する」。durability（耐久性）を高めるため年2回手入れされる。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第5文", "structure": "[S] Our furniture / [V] is / [C] available / [M] through our showroom or e-commerce website / [M] as either fully assembled units or flat-pack kits.", "note": "完成品(fully assembled)か、自分で組み立てる平らな箱入りキット(flat-pack kits)の「どちらか」で提供される。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第6文", "structure": "[S] Customers / [V] can select / [M] from a range of cushion colors and fabric options.", "note": "カラーや生地(fabric)の選択肢がある、という構造が設問Q2の「顧客によってカスタマイズ可能(can be customized)」に直結する。"}, {"refs": [{"docId": "doc1", "segmentId": "s7"}], "label": "第7文", "structure": "[S] We / [M] also / [V] offer / [O] a variety of matching accessories and protective covers / [M] for each collection.", "note": "matchingは「（色やデザインが）調和する、お揃いの」。"}]}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of the furniture produced by Maple Craft Furniture?", "choices": [{"id": "A", "text": "Material"}, {"id": "B", "text": "Weight"}, {"id": "C", "text": "Warranty period"}, {"id": "D", "text": "Setting"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s3"}], "explanation": "NOT問題。s2・s3に material(aluminum/teak wood)・weight(lightweight)・setting(balconies/gardens) が明示される。warranty period はどこにも言及がないため C が正解。"}}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the furniture sold by Maple Craft Furniture?", "choices": [{"id": "A", "text": "It is assembled only at the showroom."}, {"id": "B", "text": "It is shipped exclusively from overseas."}, {"id": "C", "text": "It can be customized by customers."}, {"id": "D", "text": "It can be purchased only through mail order."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "s6の Customers can select ... cushion colors and fabric options が can be customized by customers の言い換えで C が正解。showroom でも買えるため D は誤り。"}}]}, {"id": "web-about-003", "title": "Crossbridge Translations — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.crossbridgetranslations.com/info", "title": "Crossbridge Translations—About Us"}, "segments": [{"id": "s1", "text": "Crossbridge Translations provides two categories of language services, each tailored to specific communication needs.", "role": "overview"}, {"id": "s2", "text": "The first category is document translation, covering legal contracts and technical manuals, known for its precision and consistency.", "role": "detail"}, {"id": "s3", "text": "The second category is live interpretation for conferences and business meetings, valued for its speed and accuracy.", "role": "detail"}, {"id": "s4", "text": "All services are reviewed and certified before delivery.", "role": "detail"}, {"id": "s5", "text": "Services can be requested through our online portal as either standard delivery or expedited processing.", "role": "availability"}, {"id": "s6", "text": "Clients may upload files directly.", "role": "detail"}, {"id": "s7", "text": "We support over 40 language pairs as well as certified translations accepted by official institutions.", "role": "options"}]}]}, "structureExplanation": {"summary": "第1段落(s1–s4)で2カテゴリのサービスの特徴を対比、第2段落(s5–s7)で依頼方法・オプション。1文目は『カンマ+each+分詞』の独立分詞構文。s5の standard or expedited が Q2正解 processed at different speeds に直結する。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s1"}], "label": "第1文", "structure": "[S] Crossbridge Translations / [V] provides / [O] two categories of language services / [M] , each [being] tailored to specific communication needs.", "note": "「tailor A to B（Bに合わせてAを調整する）」の受動関係の独立分詞構文。「それぞれのサービスが、特定のコミュニケーションのニーズに合わせて作られている」。"}, {"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第2文", "structure": "[S] The first category / [V] is / [C] document translation / [M] , covering legal contracts and technical manuals / [M] , [which is] known for its precision and consistency.", "note": "「, covering ~」（～を網羅する、扱う）は document translation の具体例を説明する現在分詞。precision（正確さ）、consistency（一貫性）。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第3文", "structure": "[S] The second category / [V] is / [C] live interpretation for conferences and business meetings / [M] , [which is] valued for its speed and accuracy.", "note": "構造は非常にシンプル。accuracy（正確さ）。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第4文", "structure": "[S] All services / [V] are reviewed and certified / [M] before delivery.", "note": "certify は「～を証明する、公認する」。納品(delivery)の前に品質認定が入ることを示す。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第5文", "structure": "[S] Services / [V] can be requested / [M] through our online portal / [M] as either standard delivery or expedited processing.", "note": "expedited processing（急ぎの処理、スピード対応）。「通常(standard)」か「特急(expedited)」を選べる構造が、設問Q2の processed at different speeds の根 ": "thoroughness（徹底的なこと、綿密さ）。maintenance cleaning（定期清掃）。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第3文", "structure": "[S] The second program / [V] offers / [O] deep-cleaning treatments / [M] for industrial and manufacturing sites / [M] , [which is] known for handling heavy-duty surfaces and specialized equipment.", "note": "heavy-duty は「頑丈な、産業用の、激しい使用に耐える」。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第4文", "structure": "[S] All cleaning / [V] is performed / [M] using certified eco-friendly products.", "note": "「using ~」は手段（〜を使って）を表す分詞構文。eco-friendliness の根拠はこの文。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第5文", "structure": "[S] Services / [V] can be arranged / [M] through our online client portal or by contacting our operations team / [M] as either scheduled contracts or one-time bookings.", "note": "scheduled contracts（定期契約）か one-time bookings（単発予約）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第6文", "structure": "[S] We / [V] serve / [O] facilities / [M] ranging from small offices to large industrial campuses.", "note": "「ranging from A to B（AからBに及ぶ）」という現在分詞句が facilities を後置修飾。この構造が設問Q2の available for a range of facility sizes の確固たる根拠。campus は大学だけでなく「（広大な）敷地・工場構内」も意味する。"}, {"refs": [{"docId": "doc1", "segmentId": "s7"}], "label": "第7文", "structure": "[S] We / [M] also / [V] provide / [O] after-hours cleaning options as well as standard daytime service.", "note": "after-hours は「営業時間外の、夜間の」。"}]}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of Sparkline Services' cleaning programs?", "choices": [{"id": "A", "text": "Thoroughness"}, {"id": "B", "text": "Cost"}, {"id": "C", "text": "Reliability"}, {"id": "D", "text": "Eco-friendliness"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s4"}], "explanation": "NOT問題。s2に thoroughness と reliability、s4に eco-friendliness が明示される。cost はどこに
