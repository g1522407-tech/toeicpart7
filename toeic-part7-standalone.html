<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOEIC Part 7 構造学習</title>
<style>
:root {
  --bg: #f5f6f8;
  --card: #ffffff;
  --ink: #1f2330;
  --muted: #6b7280;
  --line: #e3e6eb;
  --accent: #2563eb;
  --accent-soft: #eaf0ff;
  --good: #15803d;
  --good-bg: #e7f6ec;
  --bad: #b91c1c;
  --bad-bg: #fdeaea;
  --evidence: #fff3bf;
  --radius: 12px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
    "Noto Sans JP", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.7;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 18px 80px;
}

/* ---- header ---- */
.site-header {
  background: var(--card);
  border-bottom: 1px solid var(--line);
  padding: 22px 18px;
  text-align: center;
}
.site-header h1 {
  margin: 0;
  font-size: 1.4rem;
}
.lead {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 0.9rem;
}
.study-header {
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
}
.study-header h1 {
  font-size: 1.1rem;
}
.back-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  white-space: nowrap;
}

/* ---- type grid ---- */
.type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 14px;
}
.type-card {
  display: block;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
}
a.type-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
  border-color: var(--accent);
}
.type-card.is-disabled {
  opacity: 0.55;
  cursor: not-allowed;
}
.type-order {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.04em;
}
.type-name {
  margin: 4px 0 2px;
  font-size: 1.02rem;
}
.type-name-en {
  margin: 0;
  font-size: 0.78rem;
  color: var(--muted);
}
.type-desc {
  margin: 8px 0 12px;
  font-size: 0.82rem;
  color: #444b59;
  min-height: 2.4em;
}
.type-progress {
  font-size: 0.8rem;
  color: var(--muted);
  border-top: 1px dashed var(--line);
  padding-top: 8px;
}
.type-progress.is-complete {
  color: var(--good);
  font-weight: 700;
}

/* ---- blocks ---- */
.block {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 18px;
}
.block h2 {
  margin: 0 0 10px;
  font-size: 1.05rem;
  border-left: 4px solid var(--accent);
  padding-left: 10px;
}

/* prediction */
.block-prediction {
  background: var(--accent-soft);
  border-color: #cdddff;
}
.pred-note {
  margin: 0 0 8px;
  font-weight: 600;
}
.pred-supplement {
  font-weight: 500;
  color: #334;
}
.pred-points {
  margin: 6px 0 0;
  padding-left: 1.2em;
  font-size: 0.9rem;
}

/* passage */
.directions {
  font-style: italic;
  color: var(--muted);
  font-size: 0.88rem;
  margin: 0 0 12px;
}
.doc {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  background: #fcfcfd;
}
.doc + .doc {
  margin-top: 18px;
}
.doc-label {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--accent);
  background: var(--accent-soft);
  border-radius: 999px;
  padding: 2px 10px;
  margin-bottom: 10px;
}
.url-bar {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.78rem;
  color: var(--muted);
  background: #eef0f3;
  border-radius: 6px;
  padding: 4px 8px;
  margin-bottom: 10px;
  word-break: break-all;
}
.doc-title {
  margin: 0 0 10px;
  font-size: 1.05rem;
}
.doc-header {
  font-size: 0.85rem;
  color: #334;
  border-bottom: 1px solid var(--line);
  padding-bottom: 8px;
  margin-bottom: 10px;
}
.doc-header .hk {
  display: inline-block;
  min-width: 58px;
  color: var(--muted);
  font-weight: 700;
}
.doc-body {
  font-size: 0.98rem;
}
.segment {
  border-radius: 4px;
  transition: background 0.2s ease;
}
.segment.is-evidence {
  background: var(--evidence);
  box-shadow: 0 0 0 2px var(--evidence);
}

/* questions */
.question {
  border-top: 1px solid var(--line);
  padding-top: 16px;
  margin-top: 16px;
}
.question:first-of-type {
  border-top: none;
  padding-top: 0;
  margin-top: 0;
}
.q-stem {
  font-weight: 600;
  margin: 0 0 10px;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.choice {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  text-align: left;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 0.92rem;
  cursor: pointer;
  font-family: inherit;
  color: inherit;
}
.choice:hover:not(:disabled) {
  border-color: var(--accent);
}
.choice.is-selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.choice:disabled {
  cursor: default;
}
.choice.is-correct {
  border-color: var(--good);
  background: var(--good-bg);
}
.choice.is-wrong {
  border-color: var(--bad);
  background: var(--bad-bg);
}
.choice-id {
  font-weight: 700;
  color: var(--accent);
}
.grade-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: inherit;
}
.grade-btn:disabled {
  background: #b8c0cf;
  cursor: not-allowed;
}
.feedback {
  margin-top: 12px;
  background: #fafbfc;
  border-radius: 8px;
  padding: 10px 14px;
}
.verdict {
  margin: 0 0 6px;
  font-weight: 700;
}
.verdict.is-correct {
  color: var(--good);
}
.verdict.is-wrong {
  color: var(--bad);
}
.explanation {
  margin: 0;
  font-size: 0.9rem;
  color: #334;
}

/* structure */
.struct-summary {
  margin: 0 0 10px;
  font-weight: 600;
}
.struct-annotations {
  margin: 0;
  padding-left: 1.2em;
  font-size: 0.9rem;
}
.struct-annotations li {
  margin-bottom: 12px;
}
.struct-label {
  font-weight: 700;
  color: var(--accent);
}
.struct-svo {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.82rem;
  color: #2a2f3a;
  background: #f4f6f9;
  border-radius: 6px;
  padding: 5px 9px;
  margin: 4px 0;
  line-height: 1.6;
}
.struct-note {
  font-size: 0.88rem;
  color: #444b59;
}

/* set navigation */
.set-nav {
  margin-bottom: 18px;
}
.setnav-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.nav-btn {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  color: var(--accent);
  white-space: nowrap;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--accent);
}
.nav-btn:disabled {
  color: #b8c0cf;
  cursor: not-allowed;
}
.set-select {
  flex: 1;
  text-align: center;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 0.88rem;
  font-family: inherit;
  background: #fff;
  color: var(--ink);
}

/* misc */
.complete-banner {
  background: var(--good-bg);
  border: 1px solid var(--good);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 18px;
  font-weight: 600;
}
.complete-banner a {
  color: var(--accent);
}
.loading {
  color: var(--muted);
}
.error {
  color: var(--bad);
}

</style>
</head>

 a city's fresh vegetable needs. The study was funded in part by the Singapore Ministry of National Development."}, {"id": "s3", "text": "Urban rooftop farms are growing in number across Asian cities. At present, most rooftop space in commercial districts remains unused. Converting even a fraction of available rooftop areas into productive growing spaces could reduce urban food insecurity and lower transportation costs for fresh produce, the report argues."}, {"id": "s4", "text": "Sandra Ho, director of the Singapore Urban Growers Association, commented, \"Business owners and building managers are showing a real interest in exploring how rooftops can serve as productive agricultural spaces.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3段落。Q1=同義語(s2)、Q2=出資元→政府機関(s2)、Q3=現状 most...(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：研究の結論と出資元", "structure": "[S] A report [released by ... City Harvest Initiative, based in Singapore] / [V] suggests / [O:that節] that urban rooftop farming could supply up to 15 percent of a city's fresh vegetable needs.　｜　[S] The study / [V:受動態] was funded / in part / by the Singapore Ministry of National Development.", "note": "supply＝『供給する』→Q1正解 provide。Ministry of National Development が Q2で A government agency に一般化。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：現状", "structure": "[M] At present, / [S] most rooftop space in commercial districts / [V] remains / [C] unused.", "note": "remain+C（〜のままである）。remains unused が Q3正解 It is not being utilized. へ言い換え。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第3段落：専門家コメント", "note": "Singapore Urban Growers Association ディレクターの引用で締めくくる。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"supply\" in paragraph 1, line 2, is closest in meaning to", "choices": [{"id": "A", "text": "grow"}, {"id": "B", "text": "import"}, {"id": "C", "text": "provide"}, {"id": "D", "text": "record"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 supply は『（人々に）供給する』の意。正解は provide。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the City Harvest Initiative report?", "choices": [{"id": "A", "text": "A government agency"}, {"id": "B", "text": "A farming cooperative"}, {"id": "C", "text": "An agricultural university"}, {"id": "D", "text": "A property development company"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の funded ... by the Singapore Ministry of National Development が根拠。固有名詞→Q2正解 A government agency。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what is currently true of most commercial rooftop space?", "choices": [{"id": "A", "text": "It is being converted into gardens."}, {"id": "B", "text": "It is occupied by solar panels."}, {"id": "C", "text": "It is used for food storage."}, {"id": "D", "text": "It is not being utilized."}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の most rooftop space ... remains unused が Q3正解 It is not being utilized. の根拠。"}}]}, {"id": "magazine-article-003", "title": "EV Industry Journal", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "EV Industry Journal"}, {"id": "s2", "text": "OSLO (9 September)—A study released by the nonprofit research group Clean Mobility Foundation, headquartered in Norway, found that widespread electric bus adoption in European cities could reduce urban air pollution by up to 35 percent. The research was partially funded by the Norwegian Ministry of Transport."}, {"id": "s3", "text": "European cities currently rely heavily on diesel-powered bus fleets. While some municipalities have begun transitioning to electric alternatives, the majority of buses still run on fossil fuels. The study argues that subsidizing electric bus procurement and establishing charging infrastructure are critical steps toward cleaner urban transit."}, {"id": "s4", "text": "Erik Lund, chairman of the Nordic Public Transport Federation, said, \"Municipal governments are beginning to understand the long-term environmental and economic benefits of electrifying public transportation fleets.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(文脈判断, s2)②出資元→政府機関(s2)③majority/mostの現状(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "widespread＝『普及した、広範な』→Q1正解 broad。出資元 Norwegian Ministry of Transport→Q2 A government ministry。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：現状", "note": "diesel-powered bus fleets／the majority of buses still run on fossil fuels→Q3正解 They use diesel fuel。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"widespread\" in paragraph 1, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "local"}, {"id": "B", "text": "rapid"}, {"id": "C", "text": "broad"}, {"id": "D", "text": "gradual"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 widespread（普及した）の正解は broad。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Clean Mobility Foundation study?", "choices": [{"id": "A", "text": "A government ministry"}, {"id": "B", "text": "A bus manufacturer"}, {"id": "C", "text": "A city transit authority"}, {"id": "D", "text": "An international airline"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の funded by the Norwegian Ministry of Transport が根拠。→Q2正解 A government ministry。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what is true of most European city buses?", "choices": [{"id": "A", "text": "They have already been replaced with electric models."}, {"id": "B", "text": "They use diesel fuel."}, {"id": "C", "text": "They are powered by natural gas."}, {"id": "D", "text": "They are operated by private companies."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の the majority of buses still run on fossil fuels が Q3正解 They use diesel fuel. の根拠。"}}]}, {"id": "magazine-article-004", "title": "Future Workforce Magazine", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Future Workforce Magazine"}, {"id": "s2", "text": "LONDON (18 November)—A report by the work trends organization Future Labor Institute, based in the United Kingdom, found that companies adopting flexible remote work policies saw employee productivity increase by an average of 17 percent. The study was supported financially by the UK Department for Business and Trade."}, {"id": "s3", "text": "Many businesses shifted to remote work arrangements during recent years. While a significant portion of employees have returned to offices, others continue to work from home on a part-time or full-time basis. Firms with structured remote work programs reported higher staff retention and lower absenteeism, according to the institute's findings."}, {"id": "s4", "text": "Judith Allen, president of the British Employer Network, remarked, \"Employers across sectors are now prioritizing flexible work arrangements as a tool for attracting and retaining skilled workers.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(s2)②出資元→政府機関(s2)③成果(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "adopting＝（制度を）『取り入れる』→Q1正解 implementing。出資元 UK Department for Business and Trade→Q2 A government department。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：成果", "note": "Firms with structured remote work programs reported higher staff retention→Q3正解 Better staff retention。retention＝定着。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"adopting\" in paragraph 1, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "rejecting"}, {"id": "B", "text": "implementing"}, {"id": "C", "text": "reviewing"}, {"id": "D", "text": "delaying"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 adopting（採用する）の正解は implementing。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Future Labor Institute report?", "choices": [{"id": "A", "text": "A government department"}, {"id": "B", "text": "A major corporation"}, {"id": "C", "text": "A labor union"}, {"id": "D", "text": "A recruitment firm"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の supported financially by the UK Department for Business and Trade が根拠。→Q2正解 A government department。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what did firms with remote work programs report?", "choices": [{"id": "A", "text": "Higher operational costs"}, {"id": "B", "text": "Increased staff turnover"}, {"id": "C", "text": "Better staff retention"}, {"id": "D", "text": "Lower employee productivity"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の reported higher staff retention が Q3正解 Better staff retention の根拠。"}}]}, {"id": "magazine-article-005", "title": "Food Supply Chain Today", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Food Supply Chain Today"}, {"id": "s2", "text": "NAIROBI (3 May)—A report issued by the nonprofit group Sustainable Harvest Network, based in Kenya, concludes that the African coffee industry could reduce its water consumption by up to 30 percent by adopting improved irrigation techniques in smallholder farms. The report received partial funding from the African Development Bank."}, {"id": "s3", "text": "The East African coffee sector employs millions of smallholder farmers who largely depend on traditional rain-fed cultivation methods. During dry seasons, crop yields decline significantly, threatening the livelihoods of farming communities. Introducing drip irrigation and rainwater harvesting systems could stabilize production and increase annual revenues, the report states."}, {"id": "s4", "text": "Victor Otieno, spokesperson for the Kenya Coffee Growers Association, said, \"Farmers are eager to adopt water-efficient technologies, but access to training and financing remains a major barrier.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(s2)②出資元→開発銀行(s2)③課題(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "concludes→Q1正解 reports。出資元 African Development Bank→Q2 A development bank。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：課題", "note": "During dry seasons, crop yields decline significantly→Q3正解 a drop in crop yields。yield＝収穫量。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"concludes\" in paragraph 1, line 2, is closest in meaning to", "choices": [{"id": "A", "text": "begins"}, {"id": "B", "text": "argues"}, {"id": "C", "text": "denies"}, {"id": "D", "text": "reports"}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 concludes（結論づける）の正解は reports。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Sustainable Harvest Network report?", "choices": [{"id": "A", "text": "A development bank"}, {"id": "B", "text": "A coffee export company"}, {"id": "C", "text": "A farming cooperative"}, {"id": "D", "text": "A government ministry"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の received partial funding from the African Development Bank が根拠。→Q2正解 A development bank。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what challenge do many coffee farmers face during dry seasons?", "choices": [{"id": "A", "text": "They cannot afford drip irrigation systems."}, {"id": "B", "text": "They are unable to sell their coffee beans."}, {"id": "C", "text": "They experience a drop in crop yields."}, {"id": "D", "text": "They lose access to water storage facilities."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の During dry seasons, crop yields decline significantly が Q3正解 a drop in crop yields の根拠。"}}]}, {"id": "magazine-article-006", "title": "Construction Technology Review", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Construction Technology Review"}, {"id": "s2", "text": "DUBAI (22 July)—A study by the construction research organization BuildSmart Institute, headquartered in the United Arab Emirates, suggests that 3D-printed housing could lower residential construction costs in the region by up to 40 percent. The research was partially funded by the UAE Ministry of Infrastructure."}, {"id": "s3", "text": "Traditional construction methods in the Gulf region rely heavily on imported materials and large labor forces. 3D-printed homes can be assembled in a fraction of the time using locally mixed concrete formulations. Several pilot projects have demonstrated that printed structures meet standard durability and safety requirements, according to the institute."}, {"id": "s4", "text": "Ahmad Khalil, chairman of the Emirates Contractors Association, noted, \"Developers are taking a serious interest in 3D printing as a cost-efficient solution for both affordable housing and commercial construction.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成。本セットは同義語(Q1)が第2段落(s3)にある点に注意。②出資元→政府機関(s2)③実証(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "出資元 UAE Ministry of Infrastructure→Q2 A government ministry。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：同義語と実証", "note": "assembled（para2）＝『（部品を組み合わせて）建てる』→Q1正解 constructed。pilot projects ... meet standard durability and safety requirements→Q3正解。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"assembled\" in paragraph 2, line 2, is closest in meaning to", "choices": [{"id": "A", "text": "designed"}, {"id": "B", "text": "transported"}, {"id": "C", "text": "constructed"}, {"id": "D", "text": "evaluated"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "下線語 assembled は第2段落(s3)にあり『組み立てる・建てる』の意。正解は constructed。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the BuildSmart Institute study?", "choices": [{"id": "A", "text": "A government ministry"}, {"id": "B", "text": "A private developer"}, {"id": "C", "text": "A construction materials company"}, {"id": "D", "text": "An international bank"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の partially funded by the UAE Ministry of Infrastructure が根拠。→Q2正解 A government ministry。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what have pilot projects involving 3D-printed homes demonstrated?", "choices": [{"id": "A", "text": "They are less durable than traditional structures."}, {"id": "B", "text": "They require a large workforce to complete."}, {"id": "C", "text": "They meet standard safety and durability requirements."}, {"id": "D", "text": "They can only be used for commercial buildings."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の pilot projects have demonstrated that printed structures meet standard durability and safety requirements が Q3正解の根拠。"}}]}, {"id": "magazine-article-007", "title": "Plant-Based Food Industry Report", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Plant-Based Food Industry Report"}, {"id": "s2", "text": "CHICAGO (11 October)—A study by the food innovation organization Protein Transition Alliance, based in the United States, found that the plant-based meat industry could capture 20 percent of the total global meat market within the next decade. The report was co-funded by the United States Department of Agriculture."}, {"id": "s3", "text": "Plant-based meat products have gained significant traction in North American and European markets over recent years. However, the majority of global meat consumption still comes from conventional animal sources. Improving taste, texture, and price competitiveness are identified as the key challenges plant-based producers must address, according to the alliance."}, {"id": "s4", "text": "Patricia Odom, CEO of the American Plant Food Association, commented, \"Consumer openness to alternative proteins is growing, and manufacturers are responding with increasingly sophisticated plant-based offerings.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(s2)②出資元→政府機関(s2)③課題(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "capture＝（シェアを）『獲得する』→Q1正解 acquire。出資元 United States Department of Agriculture→Q2 A government department。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：課題", "note": "Improving taste, texture, and price competitiveness are identified as the key challenges→Q3正解 Taste, texture, and price。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"capture\" in paragraph 1, line 2, is closest in meaning to", "choices": [{"id": "A", "text": "acquire"}, {"id": "B", "text": "lose"}, {"id": "C", "text": "evaluate"}, {"id": "D", "text": "limit"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 capture（シェアを獲得する）の正解は acquire。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Protein Transition Alliance report?", "choices": [{"id": "A", "text": "A government department"}, {"id": "B", "text": "A fast food chain"}, {"id": "C", "text": "A livestock industry group"}, {"id": "D", "text": "A supermarket chain"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の co-funded by the United States Department of Agriculture が根拠。→Q2正解 A government department。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what do most plant-based meat producers currently need to improve?", "choices": [{"id": "A", "text": "Packaging and labeling"}, {"id": "B", "text": "Taste, texture, and price"}, {"id": "C", "text": "Distribution and logistics"}, {"id": "D", "text": "Marketing and branding"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の key challenges＝taste, texture, and price competitiveness が Q3正解 Taste, texture, and price の根拠。"}}]}, {"id": "magazine-article-008", "title": "Renewable Energy Digest", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Renewable Energy Digest"}, {"id": "s2", "text": "BERLIN (30 August)—A report by the clean energy group Solar Cycle Initiative, based in Germany, found that improving the recycling rate of decommissioned solar panels could recover valuable materials worth an estimated 2 billion euros annually across Europe. The study received partial funding from the German Federal Ministry for Economic Affairs."}, {"id": "s3", "text": "Millions of solar panels installed during the early adoption phase of the renewable energy boom are now reaching the end of their useful lives. At present, only a small fraction of these panels are properly recycled; most are disposed of in industrial landfills. Recovering silicon, silver, and aluminum from retired panels could significantly reduce raw material costs for new panel production."}, {"id": "s4", "text": "Claudia Weber, spokesperson for the European Photovoltaics Industry Alliance, said, \"Panel manufacturers and recyclers are working together to develop scalable and cost-effective end-of-life recovery processes.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(s2)②出資元→政府機関(s2)③現状 most...(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "decommissioned＝『稼働停止された』→Q1正解 taken out of service。出資元 German Federal Ministry for Economic Affairs→Q2 A government ministry。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：現状", "note": "most are disposed of in industrial landfills→Q3正解。dispose of＝処分する。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"decommissioned\" in paragraph 1, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "newly installed"}, {"id": "B", "text": "taken out of service"}, {"id": "C", "text": "under repair"}, {"id": "D", "text": "exported overseas"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 decommissioned（稼働停止の）の正解は taken out of service。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Solar Cycle Initiative report?", "choices": [{"id": "A", "text": "A government ministry"}, {"id": "B", "text": "A solar panel manufacturer"}, {"id": "C", "text": "A private investment fund"}, {"id": "D", "text": "An environmental nonprofit"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の received partial funding from the German Federal Ministry for Economic Affairs が根拠。→Q2正解 A government ministry。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what currently happens to most retired solar panels in Europe?", "choices": [{"id": "A", "text": "They are sent to developing countries."}, {"id": "B", "text": "They are stored in warehouses."}, {"id": "C", "text": "They are disposed of in industrial landfills."}, {"id": "D", "text": "They are refurbished for further use."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の most are disposed of in industrial landfills が Q3正解 disposed of in industrial landfills の根拠。"}}]}, {"id": "magazine-article-009", "title": "E-Learning Insights", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "E-Learning Insights"}, {"id": "s2", "text": "TORONTO (5 April)—A report by the education research body Digital Learning Alliance, based in Canada, found that the online education market is projected to grow by 25 percent over the next five years, driven largely by demand from working adults. The study was partially supported by the Canadian Ministry of Education."}, {"id": "s3", "text": "Online courses and professional certification programs have seen significant enrollment increases across all age groups. While younger students often have access to traditional university education, adult learners increasingly rely on online platforms to upskill or change careers. Flexible scheduling and lower costs are cited as the primary reasons for choosing online learning, according to the report."}, {"id": "s4", "text": "Robert Sun, president of the Canadian EdTech Association, noted, \"Learning platform providers are expanding their offerings to meet the growing demand for career-relevant and flexible digital education.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(s2)②出資元→政府機関(s2)③理由(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "be projected to do＝『〜すると予測されている』→Q1正解 expected。出資元 Canadian Ministry of Education→Q2 A government ministry。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：理由", "note": "Flexible scheduling and lower costs are cited as the primary reasons→Q3正解 flexible schedules and lower costs。cite＝（理由として）挙げる。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"projected\" in paragraph 1, line 2, is closest in meaning to", "choices": [{"id": "A", "text": "required"}, {"id": "B", "text": "limited"}, {"id": "C", "text": "expected"}, {"id": "D", "text": "maintained"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 projected（予測されている）の正解は expected。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Digital Learning Alliance report?", "choices": [{"id": "A", "text": "A government ministry"}, {"id": "B", "text": "An online education company"}, {"id": "C", "text": "A university association"}, {"id": "D", "text": "A corporate training firm"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の partially supported by the Canadian Ministry of Education が根拠。→Q2正解 A government ministry。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, why do adult learners prefer online education?", "choices": [{"id": "A", "text": "It offers more prestigious degrees."}, {"id": "B", "text": "It is available only in urban areas."}, {"id": "C", "text": "It provides flexible schedules and lower costs."}, {"id": "D", "text": "It is required by most employers."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の Flexible scheduling and lower costs are cited as the primary reasons が Q3正解 flexible schedules and lower costs の根拠。"}}]}, {"id": "magazine-article-010", "title": "Last-Mile Delivery Review", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following article.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Last-Mile Delivery Review"}, {"id": "s2", "text": "TOKYO (17 January)—A study by the logistics research group Smart Delivery Institute, headquartered in Japan, found that commercial drone delivery could reduce last-mile delivery costs for urban retailers by up to 28 percent. The research was partially funded by the Japanese Ministry of Land, Infrastructure, Transport and Tourism."}, {"id": "s3", "text": "Last-mile delivery—the final leg of a shipment's journey from a distribution hub to the customer's door—is often the most expensive part of the logistics chain. Japan's aging delivery workforce and dense urban environments create particular challenges. Drone technology, combined with regulatory updates allowing low-altitude commercial flights, could address these challenges effectively, according to the institute."}, {"id": "s4", "text": "Taro Yamamoto, president of the Japan Logistics Federation, stated, \"Retailers and logistics companies are eager to pilot and scale drone delivery programs as urban infrastructure regulations continue to evolve.\""}]}]}, "structureExplanation": {"summary": "雑誌記事の定型3問構成：①同義語(s2)②出資元→政府機関(s2)③課題(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：結論と出資元", "note": "reduce＝（コストを）『下げる』→Q1正解 lower。出資元 Japanese Ministry of Land, Infrastructure, Transport and Tourism→Q2 A government ministry。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：課題", "note": "Japan's aging delivery workforce and dense urban environments create particular challenges→Q3正解 An aging delivery workforce。"}]}, "questions": [{"id": "q1", "questionType": "vocabulary", "stem": "The word \"reduce\" in paragraph 1, line 2, is closest in meaning to", "choices": [{"id": "A", "text": "increase"}, {"id": "B", "text": "eliminate"}, {"id": "C", "text": "lower"}, {"id": "D", "text": "measure"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の下線語 reduce（下げる）の正解は lower。"}}, {"id": "q2", "questionType": "", "stem": "Who provided financial support for the Smart Delivery Institute study?", "choices": [{"id": "A", "text": "A government ministry"}, {"id": "B", "text": "A drone manufacturer"}, {"id": "C", "text": "A retail association"}, {"id": "D", "text": "A courier company"}], "answer": "A", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の partially funded by the Japanese Ministry of Land, Infrastructure, Transport and Tourism が根拠。→Q2正解 A government ministry。"}}, {"id": "q3", "questionType": "", "stem": "According to the article, what is one challenge mentioned for last-mile delivery in Japan?", "choices": [{"id": "A", "text": "A shortage of urban distribution hubs"}, {"id": "B", "text": "High cost of delivery vehicles"}, {"id": "C", "text": "An aging delivery workforce"}, {"id": "D", "text": "Lack of customer demand for fast delivery"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の Japan's aging delivery workforce ... create particular challenges が Q3正解 An aging delivery workforce の根拠。"}}]}], "notice-insertion": [{"id": "notice-insertion-001", "title": "Calling All Amateur Photographers!", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following notice.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Calling All Amateur Photographers!"}, {"id": "s2", "text": "Would you like to see your work featured in our magazine? Do you want to make an important statement about the environment? — [1] —"}, {"id": "s3", "text": "Nurturing Nature magazine is holding a photography contest for our subscribers. All nonprofessional photographers are invited to submit up to five pictures illustrating their observations of the natural world. Photographs may be related to any of the following categories: the beauty of nature; people interacting with the natural world; and conservation activities. — [2] — Submissions will be judged by the editors of Nurturing Nature, and all decisions are final. The top ten photographs will be featured in the May issue of the magazine. — [3] —"}, {"id": "s4", "text": "Submissions are due by December 15. — [4] — Additional information can be found on our Web site at www.nurturingnature.org/photo_contest."}]}]}, "structureExplanation": {"summary": "文挿入付き通知の定型3段落：①呼びかけ(s2,[1]) ②対象者・応募カテゴリー・特典(s3,[2][3]) ③締切・URL(s4,[4])。Q1=対象者、Q2=カテゴリー外のNOT、Q3=挿入文[3]（Moreover等の追加マーカー＝2つ目の特典）。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第1段落：呼びかけ", "note": "『作品を誌面に載せたいですか？』等の疑問文で導入。[1]を含む。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：対象者・カテゴリー・特典", "structure": "[S] Photographs / [V] may be related to / [O] any of the following categories: the beauty of nature; people interacting with the natural world; and conservation activities.　｜　[S] The top ten photographs / [V:受動態] will be featured / in the May issue. — [3] —", "note": "冒頭 for our subscribers が Q1根拠。3カテゴリー列挙が Q2(NOT)の判定材料。『top ten ... featured』（1つ目の特典）の直後[3]に、Moreover で始まる挿入文（2つ目の特典＝表紙掲載）が入る＝Q3正解。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第3段落：締切とURL", "note": "due by December 15 と公式URL。[4]を含む。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "For whom is the notice most likely intended?", "choices": [{"id": "A", "text": "Contest judges"}, {"id": "B", "text": "Freelance writers"}, {"id": "C", "text": "Magazine subscribers"}, {"id": "D", "text": "Professional illustrators"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3冒頭『...photography contest for our subscribers』が Q1正解 Magazine subscribers の根拠。"}}, {"id": "q2", "questionType": "not", "stem": "What is NOT an acceptable subject for the contest photographs?", "choices": [{"id": "A", "text": "A flower garden in bloom"}, {"id": "B", "text": "A child sitting in a classroom"}, {"id": "C", "text": "A snowstorm in the mountains"}, {"id": "D", "text": "A farmer planting grain in a field"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3のカテゴリー列挙（自然の美／自然と関わる人々／環境保護活動）に A child sitting in a classroom は含まれない（自然の要素ゼロ）→NOT問題の正解。"}}, {"id": "q3", "questionType": "", "stem": "In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong? \"Moreover, the winning photograph will be shown on the magazine's cover.\"", "choices": [{"id": "A", "text": "[1]"}, {"id": "B", "text": "[2]"}, {"id": "C", "text": "[3]"}, {"id": "D", "text": "[4]"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "挿入文 Moreover, the winning photograph will be shown on the magazine's cover. は『2つ目の特典』。s3の『top ten ... featured』（1つ目の特典）直後の[3]に入る。正解 C[3]。"}}]}, {"id": "notice-insertion-002", "title": "Share Your Fitness Journey!", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following notice.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Share Your Fitness Journey!"}, {"id": "s2", "text": "Are you passionate about health and fitness? Would you like your story to inspire others around the world? — [1] —"}, {"id": "s3", "text": "ActiveLife Magazine is hosting a personal fitness story contest open to all non-professional writers. Participants may submit one original story of up to 800 words. Stories may focus on any of the following topics: overcoming a health challenge; achieving a he National Heritage Library が[3]（top6記念号掲載の直後）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "For whom is the notice most likely intended?", "choices": [{"id": "A", "text": "Professional historians"}, {"id": "B", "text": "Members of the general public with heritage stories"}, {"id": "C", "text": "Museum curators"}, {"id": "D", "text": "Heritage tourism operators"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の対象者記述が Q1正解 Members of the general public with heritage stories の根拠。"}}, {"id": "q2", "questionType": "not", "stem": "What is NOT an acceptable story focus for the contest?", "choices": [{"id": "A", "text": "A story about a local historic church"}, {"id": "B", "text": "A story about a traditional weaving practice"}, {"id": "C", "text": "A story about a fictional historical character"}, {"id": "D", "text": "A story about a neighborhood that has changed significantly"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の焦点に A story about a fictional historical character は含まれない（創作で遺産記録でない）→NOT正解。"}}, {"id": "q3", "questionType": "", "stem": "In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong? \"Furthermore, the winning story will be donated to the National Heritage Library as a permanent record.\"", "choices": [{"id": "A", "text": "[1]"}, {"id": "B", "text": "[2]"}, {"id": "C", "text": "[3]"}, {"id": "D", "text": "[4]"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "挿入文 Furthermore, the winning story will be donated to the National Heritage Library は2つ目の特典。『top six ... 記念号掲載』直後の[3]に入る。正解 C[3]。"}}]}, {"id": "notice-insertion-010", "title": "Science Communication Award — Enter Now!", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-3 refer to the following notice.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Science Communication Award — Enter Now!"}, {"id": "s2", "text": "Are you a scientist or researcher who wants to make your work accessible to a wider public audience? Would you like your writing published and celebrated nationally? — [1] —"}, {"id": "s3", "text": "Discover Today Magazine is hosting a science communication award open to all working scientists, researchers, and graduate students. Participants may submit one original article of up to 1,000 words explaining a scientific concept or discovery for a general audience. Articles may address any of the following fields: climate and environmental science; medical and biological research; physics and astronomy; and technology and engineering. — [2] — All articles will be assessed by a panel of science journalists and academic editors, and all decisions are final. The top four articles will be published in the magazine's annual science special. — [3] —"}, {"id": "s4", "text": "Submissions are due by July 31. — [4] — Submission information is available at www.discovertodaymag.com/sciaward."}]}]}, "structureExplanation": {"summary": "文挿入付き通知の定型。NOT問題の対象外＋[3]の特典並列構造(s3)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第2段落：対象者・分野・特典", "note": "分野は環境／医療・生物／物理・天文／テクノロジー。A review of a new science fiction film は映画批評で科学解説でないためQ2(NOT)正解。挿入文 Moreover, the winning author will be invited to speak at the ... symposium が[3]（top4科学特集号掲載の直後）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "For whom is the notice most likely intended?", "choices": [{"id": "A", "text": "Science magazine editors"}, {"id": "B", "text": "Scientists and researchers"}, {"id": "C", "text": "General science readers"}, {"id": "D", "text": "University admissions officers"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の対象者記述が Q1正解 Scientists and researchers の根拠。"}}, {"id": "q2", "questionType": "not", "stem": "What is NOT an acceptable field for the contest articles?", "choices": [{"id": "A", "text": "An explanation of recent climate research"}, {"id": "B", "text": "An article about a new cancer treatment discovery"}, {"id": "C", "text": "A review of a new science fiction film"}, {"id": "D", "text": "A piece on advances in quantum computing"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "s3の分野に A review of a new science fiction film は含まれない（映画批評で科学解説でない）→NOT正解。"}}, {"id": "q3", "questionType": "", "stem": "In which of the positions marked [1], [2], [3], and [4] does the following sentence best belong? \"Moreover, the winning author will be invited to speak at the magazine's annual science communication symposium.\"", "choices": [{"id": "A", "text": "[1]"}, {"id": "B", "text": "[2]"}, {"id": "C", "text": "[3]"}, {"id": "D", "text": "[4]"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "挿入文 Moreover, the winning author will be invited to speak at the symposium は2つ目の特典。『top four ... 科学特集号掲載』直後の[3]に入る。正解 C[3]。"}}]}], "email-feedback": [{"id": "email-feedback-001", "title": "Horizon Insurance — フィードバック依頼", "difficulty": "standard", "typePredictionSupplement": {"note": "このセットは担当者1名（Greenway）への満足コメント。クロス問題は人物特定ではなく『保険3年 ＝ 豪移住3年』の在豪年数推論。", "points": ["メールの for three years とフォームの ever since I relocated to Australia を結ぶ", "担当者の弱点は coverage limit details の確認＝商品知識"]}, "passage": {"format": "double", "directions": "Questions 1-5 refer to the following e-mail and form.", "documents": [{"id": "doc1", "docType": "email", "label": "E-mail", "header": {"to": "Kenji Mori <kmori22@mailbridge.net.jp>", "from": "Horizon Insurance <customersupport@horizoninsurance.com.au>", "date": "15 May", "subject": "How did we do?"}, "segments": [{"id": "s1", "text": "Dear Mr. Mori,", "role": "greeting"}, {"id": "s2", "text": "Horizon Insurance appreciates your continued loyalty as a customer and would like to thank you for maintaining your comprehensive home contents insurance for three years.", "role": "thanks"}, {"id": "s3", "text": "Since enrolling in our coverage, you have saved an average of $380 per year compared to the cost of comparable policies from leading competitors.", "role": "detail"}, {"id": "s4", "text": "Should you ever need insurance for your vehicle, for a rental property, or for travel, we have excellent coverage options for those as well.", "role": "products"}, {"id": "s5", "text": "Last month you contacted us to update your listed insured items following a home renovation.", "role": "context"}, {"id": "s6", "text": "Because we value feedback from long-term clients such as yourself, we would like to know your impression of the service provided by our customer service agent, Paul Greenway.", "role": "request"}, {"id": "s7", "text": "Please take a moment to share your experience at https://www.horizoninsurance.com.au/feedback.", "role": "request"}, {"id": "s8", "text": "Sincerely,", "role": "closing"}, {"id": "s9", "text": "Fiona Clark, Manager", "role": "signature"}, {"id": "s10", "text": "Customer Relations Team", "role": "signature"}]}, {"id": "doc2", "docType": "form", "label": "Feedback Form", "header": {"url": "https://www.horizoninsurance.com.au/feedback"}, "segments": [{"id": "s1", "text": "Dear Valued Client: Please enter a brief description of your experience with our department in the following box.", "role": "instruction"}, {"id": "s2", "text": "Horizon Insurance has been my insurer ever since I relocated to Australia for work.", "role": "context"}, {"id": "s3", "text": "I contacted your company last month to update the list of items covered under my home contents policy after completing a kitchen renovation.", "role": "context"}, {"id": "s4", "text": "Mr. Greenway answered all my questions clearly and efficiently.", "role": "evaluation"}, {"id": "s5", "text": "He mentioned that he had only recently joined the team, so he checked with a senior colleague on a few coverage limit details.", "role": "evaluation"}, {"id": "s6", "text": "He was polite and patient throughout, and in the end helped me make the right update to my policy.", "role": "evaluation"}, {"id": "s7", "text": "I was very satisfied with the service.", "role": "evaluation"}, {"id": "s8", "text": "—Mr. Kenji Mori", "role": "signature"}]}]}, "structureExplanation": {"summary": "第1文書(メール)は感謝→節約額→他商品→依頼経緯→フィードバック依頼、第2文書(フォーム)は経緯→担当者評価の流れ。クロス問題はメールの加入年数とフォームの移住時期を結ぶ。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "感謝＋加入年数", "note": "for three years が Q4 のクロス根拠の片方。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "他商品の列挙", "note": "vehicle / rental / travel → Q1『商品リストは記載あり』の根拠。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc1", "segmentId": "s7"}], "label": "フィードバック依頼", "note": "Q1『依頼は記載あり』＋ Q3 impression の出所。"}, {"refs": [{"docId": "doc2", "segmentId": "s2"}], "label": "移住時期", "note": "ever since I relocated to Australia → Q4 のクロス根拠のもう片方。"}, {"refs": [{"docId": "doc2", "segmentId": "s5"}], "label": "担当者の弱点", "note": "coverage limit details を先輩に確認 → Q5 の商品知識不足。"}]}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT included in the e-mail?", "choices": [{"id": "A", "text": "A list of available insurance products"}, {"id": "B", "text": "An expression of thanks to the customer"}, {"id": "C", "text": "A discount offer for renewing the policy"}, {"id": "D", "text": "A request for customer feedback"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s4"}, {"docId": "doc1", "segmentId": "s7"}], "explanation": "感謝(s2)・商品リスト(vehicle/rental/travel, s4)・フィードバック依頼(s7)はメールに記載がある。更新割引はどこにも言及がないため C が正解。"}}, {"id": "q2", "questionType": "inference", "stem": "Who most likely is Ms. Clark?", "choices": [{"id": "A", "text": "A corporate attorney"}, {"id": "B", "text": "An insurance sales representative"}, {"id": "C", "text": "A customer service supervisor"}, {"id": "D", "text": "An insurance product developer"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s9"}, {"docId": "doc1", "segmentId": "s10"}], "explanation": "署名が Fiona Clark, Manager（s9）/ Customer Relations Team（s10）。顧客対応部門の管理職 → customer service supervisor。"}}, {"id": "q3", "questionType": "vocabulary", "stem": "In the e-mail, the word \"impression\" in paragraph 3, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "mark"}, {"id": "B", "text": "opinion"}, {"id": "C", "text": "example"}, {"id": "D", "text": "contract"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "your impression of the service（s6）はサービスへの『感想・意見』。文脈に最も合うのは opinion。"}}, {"id": "q4", "questionType": "crossref", "stem": "What can be concluded about Mr. Mori?", "choices": [{"id": "A", "text": "He is planning to travel soon."}, {"id": "B", "text": "He has lived in Australia for three years."}, {"id": "C", "text": "He is looking for vehicle insurance."}, {"id": "D", "text": "He had a different insurer in his first year."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "メール(s2)は加入 for three years、フォーム(doc2 s2)は『豪に移住して以来ずっと Horizon が保険会社』と述べる。両文書を結ぶと移住＝約3年前 → 在豪3年と結論でき B が正解。"}}, {"id": "q5", "questionType": "detail", "stem": "What aspect of customer service did Mr. Greenway have difficulty with?", "choices": [{"id": "A", "text": "Policy product knowledge"}, {"id": "B", "text": "Communication with the client"}, {"id": "C", "text": "Patience with the customer"}, {"id": "D", "text": "Knowledge of the claims process"}], "answer": "A", "evidence": {"refs": [{"docId": "doc2", "segmentId": "s5"}], "explanation": "フォーム(s5)で coverage limit details を先輩に確認したとある＝補償内容（商品）の知識が不足。よって A が正解。"}}]}, {"id": "email-feedback-002", "title": "BlueWave Telecom — フィードバック", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following e-mail and form.", "documents": [{"id": "doc1", "docType": "email", "label": "E-mail", "header": {"to": "Amira Nasser <anasser88@webmail.sa>", "from": "BlueWave Telecom <clientsupport@bluewavetelcom.com.au>", "date": "22 June", "subject": "Tell us about your experience"}, "segments": [{"id": "s1", "text": "Dear Ms. Nasser,"}, {"id": "s2", "text": "BlueWave Telecom values its loyal customers and thanks you for your continued subscription to our business mobile plan for the past two years."}, {"id": "s3", "text": "During this time, your plan has saved you approximately $290 per year compared to similar packages from leading providers."}, {"id": "s4", "text": "Should you need internet, home phone, or small business broadband solutions, we also offer competitive packages for all of these."}, {"id": "s5", "text": "Earlier this month you contacted our support line to resolve an issue with international roaming activation on your account."}, {"id": "s6", "text": "Because we are always working to improve our service, we would greatly appreciate your feedback on the assistance provided by our support agent, Karen Booth."}, {"id": "s7", "text": "Please visit https://www.bluewavetelcom.com.au/feedback to share your experience."}, {"id": "s8", "text": "Warm regards,"}, {"id": "s9", "text": "Stuart Haines, Manager"}, {"id": "s10", "text": "Customer Experience Team"}]}, {"id": "doc2", "docType": "form", "label": "Feedback Form", "header": {"url": "https://www.bluewavetelcom.com.au/feedback"}, "segments": [{"id": "s1", "text": "Dear Valued Client: Please describe your recent experience with our support team in the box below."}, {"id": "s2", "text": "BlueWave Telecom has been my mobile provider since I relocated to Australia for business."}, {"id": "s3", "text": "I reached out to the support line recently to activate international roaming before an upcoming trip."}, {"id": "s4", "text": "Ms. Booth was helpful and addressed my questions quickly."}, {"id": "s5", "text": "She mentioned she was still familiarizing herself with the international roaming system, so she placed me on a brief hold while she confirmed the activation steps with a colleague."}, {"id": "s6", "text": "She was professional and courteous, and ultimately ensured my roaming was activated correctly before the call ended."}, {"id": "s7", "text": "I was pleased with the outcome."}, {"id": "s8", "text": "—Ms. Amira Nasser"}]}]}, "structureExplanation": {"summary": "", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT included in the e-mail?", "choices": [{"id": "A", "text": "A description of additional services offered"}, {"id": "B", "text": "An expression of appreciation to the client"}, {"id": "C", "text": "A promotional discount on the client's current plan"}, {"id": "D", "text": "A request for customer feedback"}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q2", "questionType": "", "stem": "Who most likely is Mr. Haines?", "choices": [{"id": "A", "text": "A mobile network engineer"}, {"id": "B", "text": "A customer service manager"}, {"id": "C", "text": "A marketing executive"}, {"id": "D", "text": "A product pricing analyst"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q3", "questionType": "vocabulary", "stem": "In the e-mail, the word \"competitive\" in paragraph 1, line 5, is closest in meaning to", "choices": [{"id": "A", "text": "expensive"}, {"id": "B", "text": "exclusive"}, {"id": "C", "text": "attractively priced"}, {"id": "D", "text": "limited"}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q4", "questionType": "", "stem": "What can be concluded about Ms. Nasser?", "choices": [{"id": "A", "text": "She is planning to move abroad soon."}, {"id": "B", "text": "She has been a customer for two years."}, {"id": "C", "text": "She is shopping for home internet plans."}, {"id": "D", "text": "She had a different provider in her first year."}  hosting provider before StellarHost."}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q5", "questionType": "", "stem": "What aspect of customer service did Ms. Liu have difficulty with?", "choices": [{"id": "A", "text": "Her communication with the client"}, {"id": "B", "text": "Her knowledge of business-tier outage diagnostics"}, {"id": "C", "text": "Her patience with the client"}, {"id": "D", "text": "Her ability to access the client's account"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}]}, {"id": "email-feedback-009", "title": "PureWater Solutions — フィードバック", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following e-mail and form.", "documents": [{"id": "doc1", "docType": "email", "label": "E-mail", "header": {"to": "Sandra Wolfe <sandra.wolfe@personalnet.de>", "from": "PureWater Solutions <support@purewatersolns.com.au>", "date": "14 February", "subject": "We want to hear from you"}, "segments": [{"id": "s1", "text": "Dear Ms. Wolfe,"}, {"id": "s2", "text": "PureWater Solutions is grateful for your loyalty as a commercial filtration client for the past three years."}, {"id": "s3", "text": "Your current maintenance contract has saved your business an average of $360 per year in repair and replacement costs compared to ad-hoc servicing from other providers."}, {"id": "s4", "text": "Should your needs extend to industrial filtration, water quality testing, or wastewater treatment solutions, we offer expert services for all of these."}, {"id": "s5", "text": "Last month you contacted our service team to schedule an urgent maintenance call for one of your filtration units that had reported a pressure alarm."}, {"id": "s6", "text": "As we are committed to delivering the highest level of service, we would appreciate your feedback on the experience provided by our service coordinator, Noel Burton."}, {"id": "s7", "text": "Please share your thoughts at https://www.purewatersolns.com.au/feedback."}, {"id": "s8", "text": "With appreciation,"}, {"id": "s9", "text": "Ann-Marie Kaye, Manager"}, {"id": "s10", "text": "Service Coordination Team"}]}, {"id": "doc2", "docType": "form", "label": "Feedback Form", "header": {"url": "https://www.purewatersolns.com.au/feedback"}, "segments": [{"id": "s1", "text": "Dear Valued Client: Please describe your recent experience with our service team in the following box."}, {"id": "s2", "text": "PureWater Solutions has managed the filtration maintenance for my commercial premises since I moved to Australia for business."}, {"id": "s3", "text": "I contacted the service team last month after receiving a pressure alarm from one of my filtration units."}, {"id": "s4", "text": "Mr. Burton handled my request attentively and professionally."}, {"id": "s5", "text": "He let me know that he had only recently transferred from the residential service team to the commercial accounts team, so he needed to verify the priority scheduling protocol with his supervisor before confirming a callout time."}, {"id": "s6", "text": "He communicated clearly and kept me updated throughout, and the technician arrived within the time window he had given me."}, {"id": "s7", "text": "I was very satisfied with the support."}, {"id": "s8", "text": "—Ms. Sandra Wolfe"}]}]}, "structureExplanation": {"summary": "", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT included in the e-mail?", "choices": [{"id": "A", "text": "A description of additional services offered"}, {"id": "B", "text": "An expression of gratitude to the client"}, {"id": "C", "text": "A discount on the next maintenance contract renewal"}, {"id": "D", "text": "A request for client feedback"}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q2", "questionType": "", "stem": "Who most likely is Ms. Kaye?", "choices": [{"id": "A", "text": "A filtration system engineer"}, {"id": "B", "text": "A service coordination manager"}, {"id": "C", "text": "A water quality testing specialist"}, {"id": "D", "text": "A commercial property consultant"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q3", "questionType": "vocabulary", "stem": "In the e-mail, the word \"urgent\" in paragraph 2, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "routine"}, {"id": "B", "text": "delayed"}, {"id": "C", "text": "immediate"}, {"id": "D", "text": "optional"}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q4", "questionType": "", "stem": "What can be concluded about Ms. Wolfe?", "choices": [{"id": "A", "text": "She is planning to expand her filtration system."}, {"id": "B", "text": "She has been a client for three years."}, {"id": "C", "text": "She is looking for wastewater treatment services."}, {"id": "D", "text": "She used a different provider before PureWater."}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q5", "questionType": "", "stem": "What aspect of customer service did Mr. Burton have difficulty with?", "choices": [{"id": "A", "text": "His communication with the client"}, {"id": "B", "text": "His knowledge of commercial priority scheduling"}, {"id": "C", "text": "His patience with the client's concerns"}, {"id": "D", "text": "His ability to book a technician in the system"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}]}, {"id": "email-feedback-010", "title": "Compass Property Management — フィードバック", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following e-mail and form.", "documents": [{"id": "doc1", "docType": "email", "label": "E-mail", "header": {"to": "Hiroshi Yamamoto <hyamamoto_work@j-connect.jp>", "from": "Compass Property Management <feedback@compassproptymgt.com.au>", "date": "28 March", "subject": "How was your property management experience?"}, "segments": [{"id": "s1", "text": "Dear Mr. Yamamoto,"}, {"id": "s2", "text": "Compass Property Management thanks you for entrusting us with the management of your investment property for the past four years."}, {"id": "s3", "text": "Our services have helped you achieve an average rental return that is $580 per year higher than properties managed by other firms in your suburb."}, {"id": "s4", "text": "Should you need assistance with property maintenance coordination, tenant screening, or investment property advice, we provide expert support for all of these."}, {"id": "s5", "text": "Last week you contacted our leasing team to address a maintenance request submitted by your tenant and request a status update."}, {"id": "s6", "text": "As we are always looking to refine our service standards, we would welcome your feedback on the experience provided by our property management consultant, Nicole Holt."}, {"id": "s7", "text": "Please share your thoughts at https://www.compasspropertymgt.com.au/feedback."}, {"id": "s8", "text": "Sincerely,"}, {"id": "s9", "text": "Duncan Lee, Manager"}, {"id": "s10", "text": "Property Management Division"}]}, {"id": "doc2", "docType": "form", "label": "Feedback Form", "header": {"url": "https://www.compasspropertymgt.com.au/feedback"}, "segments": [{"id": "s1", "text": "Dear Valued Client: Please provide a brief description of your recent experience with our team in the box below."}, {"id": "s2", "text": "Compass Property Management has looked after my investment property in Australia since I purchased it."}, {"id": "s3", "text": "I contacted the leasing team last week to follow up on a maintenance issue my tenant had reported that had not yet been actioned."}, {"id": "s4", "text": "Ms. Holt was attentive and helpful."}, {"id": "s5", "text": "She explained that she had recently joined the commercial leasing division from residential property management, so she needed to confirm the correct maintenance escalation process with a senior colleague before she could provide a timeline."}, {"id": "s6", "text": "She remained professional and kept me fully updated, and the issue was resolved within two business days."}, {"id": "s7", "text": "I was satisfied with how the matter was managed."}, {"id": "s8", "text": "—Mr. Hiroshi Yamamoto"}]}]}, "structureExplanation": {"summary": "", "annotations": []}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT included in the e-mail?", "choices": [{"id": "A", "text": "A description of additional property services offered"}, {"id": "B", "text": "An expression of thanks to the property owner"}, {"id": "C", "text": "A reduced management fee for long-term clients"}, {"id": "D", "text": "A request for client feedback"}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q2", "questionType": "", "stem": "Who most likely is Mr. Lee?", "choices": [{"id": "A", "text": "A real estate sales agent"}, {"id": "B", "text": "A property management division manager"}, {"id": "C", "text": "A tenant screening specialist"}, {"id": "D", "text": "A property valuation consultant"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q3", "questionType": "vocabulary", "stem": "In the e-mail, the word \"entrusting\" in paragraph 1, line 1, is closest in meaning to", "choices": [{"id": "A", "text": "hiring"}, {"id": "B", "text": "relying on"}, {"id": "C", "text": "giving responsibility to"}, {"id": "D", "text": "investing in"}], "answer": "C", "evidence": {"refs": [], "explanation": ""}}, {"id": "q4", "questionType": "", "stem": "What can be concluded about Mr. Yamamoto?", "choices": [{"id": "A", "text": "He is planning to purchase another investment property."}, {"id": "B", "text": "He has been a client for four years."}, {"id": "C", "text": "He is looking for tenant screening services."}, {"id": "D", "text": "He used a different property manager before Compass."}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}, {"id": "q5", "questionType": "", "stem": "What aspect of customer service did Ms. Holt have difficulty with?", "choices": [{"id": "A", "text": "Her communication with the client"}, {"id": "B", "text": "Her knowledge of the maintenance escalation process"}, {"id": "C", "text": "Her patience during the conversation"}, {"id": "D", "text": "Her ability to contact the maintenance contractor"}], "answer": "B", "evidence": {"refs": [], "explanation": ""}}]}], "advertisement": [{"id": "advertisement-001", "title": "Ironbridge Precision Tools", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-4 refer to the following advertisement.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Ironbridge Precision Tools"}, {"id": "s2", "text": "If specialized industrial machinery is central to your operations, you know how disruptive it is when a critical component fails and standard replacement parts are unavailable. Don't let equipment downtime drain your productivity and revenue. Contact Ironbridge Precision Tools. We are headquartered in Sheffield, UK, with clients across Germany, the Netherlands, and Scandinavia."}, {"id": "s3", "text": "What we do"}, {"id": "s4", "text": "• We can reverse-engineer a damaged component and fabricate an exact-match replacement using precision CNC machining."}, {"id": "s5", "text": "• Our engineers are specialists in out-of-production industrial and heavy manufacturing equipment. They provide preventive maintenance consultations to help you identify wear-prone components before failure occurs."}, {"id": "s6", "text": "• Our technical team can audit your equipment maintenance schedule and recommend upgrades to extend equipment life and reduce unplanned downtime."}, {"id": "s7", "text": "We have worked on..."}, {"id": "s8", "text": "• hydraulic presses and stamping machines"}, {"id": "s9", "text": "• conveyor systems and drive units"}, {"id": "s10", "text": "• industrial cutting and grinding machinery"}, {"id": "s11", "text": "• equipment manufactured in Germany, Austria, Switzerland, Czech Republic, and Poland"}, {"id": "s12", "text": "Visit http://www.ironbridgeprecision.co.uk or call our main office at +44-114-555-0234 today!"}]}]}, "structureExplanation": {"summary": "BtoB広告の定型：①リード文＝想定顧客(If節)＋本社所在地(s2) ②What we do＝サービス内容(s4–s6) ③We have worked on＝実績リスト(s11)。Q1/Q2=s2、Q3=s4–s6、Q4=s11。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "リード文：想定顧客＋本社", "structure": "[M:条件節] If specialized industrial machinery is central to your operations, / [S] you / [V] know / [O:名詞節] how disruptive it is when ...　｜　[S] We / [V:受動態] are headquartered / [M] in Sheffield, UK.", "note": "If [設備] is central to your operations → その設備を業務の核にする業種が想定顧客＝Q1（Industrial plant managers）。headquartered in Sheffield, UK が Q2（In Sheffield）。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}, {"docId": "doc1", "segmentId": "s5"}, {"docId": "doc1", "segmentId": "s6"}], "label": "What we do：サービス内容", "note": "reverse-engineer / preventive maintenance / 監査など提供サービスを箇条書き＝Q3（提供サービスの種類）。"}, {"refs": [{"docId": "doc1", "segmentId": "s11"}], "label": "実績リストの意図", "note": "equipment manufactured in Germany, Austria... のリスト。本セットの正解は To indicate where the company has supplied services。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "Who are most likely to be clients of Ironbridge Precision Tools?", "choices": [{"id": "A", "text": "Antique collectors"}, {"id": "B", "text": "Industrial plant managers"}, {"id": "C", "text": "Commercial airline operators"}, {"id": "D", "text": "Retail shop owners"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の If specialized industrial machinery is central to your operations が想定顧客の根拠＝Q1正解 Industrial plant managers。"}}, {"id": "q2", "questionType": "", "stem": "Where most likely is Ironbridge Precision Tools' main office?", "choices": [{"id": "A", "text": "In Germany"}, {"id": "B", "text": "In Sheffield"}, {"id": "C", "text": "In the Netherlands"}, {"id": "D", "text": "In Scandinavia"}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "s2の We are headquartered in Sheffield, UK が本社＝Q2正解 In Sheffield。"}}, {"id": "q3", "questionType": "", "stem": "What information is included in the advertisement?", "choices": [{"id": "A", "text": "The hourly rates charged for repair work"}, {"id": "B", "text": "The number of engineers employed"}, {"id": "C", "text": "The types of services the company provides"}, {"id": "D", "text": "How long ago the company was founded"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s4"}, {"docId": "doc1", "segmentId": "s5"}, {"docId": "doc1", "segmentId": "s6"}], "explanation": "s3 What we do 直下の s4–s6 に提供サービスが列挙される＝Q3正解 The types of services the company provides。"}}, {"id": "q4", "questionType": "", "stem": "Why does the advertisement list several countries?", "choices": [{"id": "A", "text": "To show where clients can pick up equipment"}, {"id": "B", "text": "To identify the nationalities of the company's engineers"}, {"id": "C", "text": "To indicate where the company has supplied services"}, {"id": "D", "text": "To show where the company has training centers"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s11"}], "explanation": "s11の equipment manufactured in [諸国] のリストは、同社が対応してきた地域を示す＝Q4正解 To indicate where the company has supplied services。"}}]}, {"id": "advertisement-002", "title": "Clearview Marine Services", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-4 refer to the following advertisement.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "Clearview Marine Services"}, {"id": "s2", "text": "If aging marine and offshore equipment is critical to your business, you know how costly it is when parts become unavailable for vessels and platforms that have been in service for 20, 30, or 40 years. Don't let an unavailable part halt your operations. Call Clearview Marine Services. We are based in Rotterdam, Netherlands, with clients throughout Norway, Denmark, and the United Kingdom."}, {"id": "s3", "text": "What we do"}, {"id": "s4", "text": "• We can fabricate a replacement part based on original specifications or a damaged sample, delivering a fully functional component."}, {"id": "s5", "text": "• Our marine engineers are experts in legacy offshore and commercial shipping equipment. They offer predictive maintenance services to help you prevent breakdowns before they happen."}, {"id": "s6", "text": "• Our operations team can evaluate your vessel's maintenance protocols and suggest practical improvements that reduce service interruptions and extend operational lifespan."}, {"id": "s7", "text": "We have worked on..."}, {"id": "s8", "text": "• ship propulsion and steering systems"}, {"id": "s9", "text": "• offshore platform hydraulic components"}, {"id": "s10", "text": "• cargo handling cranes and winches"}, {"id": "s11", "text": "• equipment of Norwegian, Danish, British, German, and Dutch origin"}, {"id": "s12", "text": "Visit http://www.clearviewmarineservices.nl or contact our Rotterdam office at +31-10-555-0891 today!"}]}]}, "structureExplanation": {"summary": "BtoB広告の定型。Q1/Q2=リード(s2)、Q3=サービス(s4–s6)、Q4=実績リスト(s11, of ~ origin→origins)。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "リード文：想定顧客＋本社", "structure": "[M:条件節] If aging marine and offshore equipment is critical to your business, / [S] you / [V] know / [O] how costly it is when ...　｜　[S] We / [V:受動態] are based / [M] in Rotterdam, Netherlands.", "note": "marine and offshore equipment を扱う業種＝Q1（Shipping and offshore industry operators）。based in Rotterdam が Q2（In Rotterdam）。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}, {"docId": "doc1", "segmentId": "s5"}, {"docId": "doc1", "segmentId": "s6"}], "label": "What we do：サービス内容", "note": "部品製作 / predictive maintenance / プロトコル評価など＝Q3。"}, {"refs": [{"docId": "doc1", "se ype": "email", "label": "E-mail", "header": {"to": "Sol Jung <sol.jung@sunrisetowerhotel.com>", "from": "Martin Delacroix <mdelacroix@delacroixstudios.ca>", "date": "12 February", "subject": "Recovered camera"}, "segments": [{"id": "s1", "text": "Dear Ms. Jung,"}, {"id": "s2", "text": "I stayed at the Sunrise Tower Hotel in Seoul from 3 to 4 February while attending a photography industry symposium. When I checked out the following morning, I realized I had left my professional camera in the room. I had placed it on the desk beside the television, and unfortunately I only noticed it was missing after I had already departed for the airport."}, {"id": "s3", "text": "I was scheduled to drive to Quebec's eastern townships immediately upon returning to Canada to document a series of architectural features for a commission, and I urgently needed the camera because I rely entirely on it for commercial assignments."}, {"id": "s4", "text": "I called the hotel from Incheon Airport and spoke with the front desk, who transferred me to the guest services manager. She personally arranged for the camera to be packaged and shipped to my studio in Montreal via expedited international courier. I received it on the same day it cleared customs, and I was able to leave for the townships the following morning as planned. This outstanding display of service reflects the consistently high standard I have come to associate with Sunrise Tower Hotel, which is why it remains my preferred accommodation whenever I travel to Korea."}, {"id": "s5", "text": "Sincerely,"}, {"id": "s6", "text": "Martin Delacroix"}, {"id": "s7", "text": "Commercial Photographer, Delacroix Studios"}]}]}, "structureExplanation": {"summary": "申告書＋メールの定型。第1文書(申告書)：内容物(s8)・通関日 Cleared(s10–s11)。第2文書(メール)：忘れ物の経緯(s2)→お礼と『通関と同じ日に受領→翌朝行動』(s4)。クロスQ4は doc1 の通関日＋1日。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s8"}], "label": "申告書：内容物", "note": "Contents: ProSight Camera → Q1（the package contained a camera）。"}, {"re
