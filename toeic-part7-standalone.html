references の言い換えで C が正解。online でも買え、検査は two inspections のため B・D は誤り。"}}]}, {"id": "web-about-010", "title": "Green Leaf Beauty — About Us", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following Web page.", "documents": [{"id": "doc1", "docType": "webpage", "header": {"url": "https://www.greenleafbeauty.com/about", "title": "Green Leaf Beauty—About Us"}, "segments": [{"id": "s1", "text": "Green Leaf Beauty produces two collections of organic skincare products, each formulated for a specific skin type.", "role": "overview"}, {"id": "s2", "text": "The first collection targets dry and sensitive skin, using botanical oils and plant-based extracts recognized for their soothing and moisturizing properties.", "role": "detail"}, {"id": "s3", "text": "The second collection is designed for oily and combination skin, featuring mineral-rich clays known for their clarifying and balancing effects.", "role": "detail"}, {"id": "s4", "text": "All ingredients are certified organic and tested twice annually.", "role": "detail"}, {"id": "s5", "text": "Products are available at select health and beauty retailers or through our direct-to-consumer website as either individual items or curated gift sets.", "role": "availability"}, {"id": "s6", "text": "Customers can build personalized skincare routines using our online consultation tool.", "role": "options"}, {"id": "s7", "text": "We offer fragrance-free versions of all products as well as lightly scented options using natural essential oils.", "role": "options"}]}]}, "structureExplanation": {"summary": "第1段落(s1–s4)で2コレクションの特徴を対比、第2段落(s5–s7)で購入形態・オプション。1文目は『カンマ+each+分詞』の独立分詞構文。s6の online consultation tool が Q2正解 selected based on individual skin needs のトリガー。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s1"}], "label": "第1文", "structure": "[S] Green Leaf Beauty / [V] produces / [O] two collections of organic skincare products / [M] , each [being] formulated for a specific skin type."}, {"refs": [{"docId": "doc1", "segmentId": "s2"}], "label": "第2文", "structure": "[S] The first collection / [V] targets / [O] dry and sensitive skin / [M] , using botanical oils and plant-based extracts / [M] [which are] recognized for their soothing and moisturizing properties.", "note": "botanical（植物の）。soothing（和らげる、なだめる）、moisturizing（保湿する）。ここでも properties（特性）が骨組みとして機能。"}, {"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第3文", "structure": "[S] The second collection / [V] is designed / [M] for oily and combination skin / [M] , featuring mineral-rich clays / [M] [which are] known for their clarifying and balancing effects.", "note": "combination skin（混合肌）。clarifying（肌を清浄にする、透明にする）。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第4文", "structure": "[S] All ingredients / [V] are [certified] / [C] organic / [V2] and [are] tested / [M] twice annually.", "note": "twice annually は twice a year（年に2回）の言い換え。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第5文", "structure": "[S] Products / [V] are / [C] available / [M] at select health and beauty retailers or through our direct-to-consumer website / [M] as either individual items or curated gift sets.", "note": "select は形容詞で「厳選された」。curated は「特別なテーマで選別された」。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第6文", "structure": "[S] Customers / [V] can build / [O] personalized skincare routines / [M] using our online consultation tool.", "note": "「オンライン相談ツール(online consultation tool)を使ってカスタムルーティンを組める」構造が、設問Q2正解の selected based on individual skin needs のトリガー。"}, {"refs": [{"docId": "doc1", "segmentId": "s7"}], "label": "第7文", "structure": "[S] We / [V] offer / [O] fragrance-free versions of all products as well as lightly scented options / [M] using natural essential oils.", "note": "fragrance-free（無香料の）。"}]}, "questions": [{"id": "q1", "questionType": "not", "stem": "What is NOT mentioned as a characteristic of Green Leaf Beauty's products?", "choices": [{"id": "A", "text": "Properties"}, {"id": "B", "text": "Effects"}, {"id": "C", "text": "Packaging material"}, {"id": "D", "text": "Ingredients"}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s3"}], "explanation": "NOT問題。s2に properties と ingredients(botanical oils/extracts)、s3に effects(clarifying and balancing) が明示される。packaging material はどこにも言及がないため C が正解。"}}, {"id": "q2", "questionType": "detail", "stem": "What is stated about the products sold by Green Leaf Beauty?", "choices": [{"id": "A", "text": "They are manufactured at a single certified facility."}, {"id": "B", "text": "They are available only in physical stores."}, {"id": "C", "text": "They can be selected based on individual skin needs."}, {"id": "D", "text": "They are available only in fragrance-free versions."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "s6の build personalized skincare routines using our online consultation tool が selected based on individual skin needs のトリガーで C が正解。website でも買えるため B は誤り。"}}]}], "double-reviews": [{"id": "double-reviews-001", "title": "Celebrated Astronaut Writes First Book", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Celebrated Astronaut Writes First Book"}, {"id": "s2", "text": "Space exploration fans worldwide have followed Yuna Kang's career since her record-breaking 14-month mission aboard the International Space Station. Her debut book, Above the Clouds, is a personal and scientific account of what it means to live and work beyond the boundaries of Earth."}, {"id": "s3", "text": "\"My editor, Greg Santos, was expecting a technical mission log,\" Commander Kang said recently. \"But I kept thinking about the quieter moments — floating in the observation module and trying to find words for what I was seeing.\""}, {"id": "s4", "text": "For Commander Kang, writing offered a new form of communication. \"I grew up reading accounts by explorers and scientists who put their experiences into words. I hoped to do the same for a new generation.\""}, {"id": "s5", "text": "When asked if the book would match the public attention of her previous publication, the scientific report Microgravity and Human Performance, she was candid. \"The report was for specialists. Above the Clouds is for everyone who has ever looked up at the sky and wondered.\""}, {"id": "s6", "text": "Above the Clouds by Yuna Kang. 285 pages. Orbit Press. $36."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.spacebookreviews.com/reviews/april/above_the_clouds"}, "segments": [{"id": "s1", "text": "Nathan Pierce Reviews Above the Clouds"}, {"id": "s2", "text": "Space exploration books are plentiful, but Yuna Kang's Above the Clouds is among the finest of the genre. This luminous debut memoir, featuring stunning orbital photography curated by NASA archivist Dr. Laura Hines and a foreword by astronaut educator James Ortega, delivers over 20 chapters of vivid, scientifically grounded personal narrative. The writing balances technical clarity with genuine emotional resonance. The only hesitation I have is the price — $36 for a debut memoir is at the upper end of the range, and this may cause some readers to pause. For those who do commit, it is a deeply inspiring and remarkably beautiful book, and I recommend it wholeheartedly to anyone curious about life beyond our planet."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。第1文書：著者紹介＋編集者(s3)＋過去の出版実績と著者の弁(s5)＋価格(s6)。第2文書：書評と価格懸念(s2)。クロスQ5＝doc1の価格×doc2の price hesitation。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：編集者", "note": "My editor, Greg Santos → Q3（編集・出版を管理する人物）。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "previous publication, the scientific report Microgravity and Human Performance（Q1/Q2：デビュー作の前に専門書を出版済み）。The report was for specialists. Above the Clouds is for everyone（Q4：より広い一般読者へ）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $36 ×doc2 s2 の『$36 ... at the upper end of the range ... cause some readers to pause』＝両者共通の価格懸念（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article review about Microgravity and Human Performance?", "choices": [{"id": "A", "text": "It is the space station module where Commander Kang conducted research."}, {"id": "B", "text": "It is a scientific publication Commander Kang released previously."}, {"id": "C", "text": "It was co-authored with a fellow astronaut."}, {"id": "D", "text": "It was recently updated with new mission data."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の previous publication, the scientific report Microgravity and Human Performance が Q1正解 a scientific publication Commander Kang released previously の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Yuna Kang?", "choices": [{"id": "A", "text": "She has not published or presented any prior work."}, {"id": "B", "text": "She studied science writing before becoming an astronaut."}, {"id": "C", "text": "She produced prior published work before writing this memoir."}, {"id": "D", "text": "She co-manages her publishing career with Greg Santos."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 で今回はデビュー作だが過去に科学報告書を出版済み＝Q2正解 produced prior published work before writing this memoir。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Mr. Santos?", "choices": [{"id": "A", "text": "He is the photographer for Above the Clouds."}, {"id": "B", "text": "He manages the editorial and publishing of Commander Kang's book."}, {"id": "C", "text": "He co-authored Microgravity and Human Performance."}, {"id": "D", "text": "He is a fellow astronaut."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の My editor, Greg Santos＝Q3正解 He manages the editorial and publishing of Commander Kang's book。"}}, {"id": "q4", "questionType": "", "stem": "What does Commander Kang say about Above the Clouds' commercial prospects?", "choices": [{"id": "A", "text": "She expects it to reach the same specialist audience as her scientific report."}, {"id": "B", "text": "She believes it will outsell all previous space exploration books."}, {"id": "C", "text": "She thinks it will reach a wider, more general readership than her scientific work."}, {"id": "D", "text": "She is confident it will become a bestseller immediately."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の The report was for specialists. Above the Clouds is for everyone ＝Q4正解 reach a wider, more general readership than her scientific work。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on regarding Above the Clouds?", "choices": [{"id": "A", "text": "The orbital photography is the highlight."}, {"id": "B", "text": "The price may give some readers pause."}, {"id": "C", "text": "The writing is too technical for a general audience."}, {"id": "D", "text": "The book would be better as a documentary film."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $36 と doc2 s2 の price hesitation（upper end of the range ... pause）が一致＝Q5正解 The price may give some readers pause。"}}]}, {"id": "double-reviews-002", "title": "Olympic Coach Turns Author with Debut Training Memoir", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Olympic Coach Turns Author with Debut Training Memoir"}, {"id": "s2", "text": "Sports fans who follow competitive swimming will recognize Elena Sorokina as the coach behind six Olympic gold medals. Her debut book, The Deep End, is part memoir and part philosophy of coaching, tracing the principles and personal stories that shaped her approach to developing world-class athletes."}, {"id": "s3", "text": "\"My publisher, Kenji Watanabe, wanted a straightforward training manual,\" Ms. Sorokina said in a recent interview. \"But I wanted to write about the relationship between coach and athlete — the trust, the doubt, the breakthroughs.\""}, {"id": "s4", "text": "For Ms. Sorokina, writing the book was an act of reflection. \"I have read coaching memoirs since I was a young competitive swimmer. They shaped how I think about leadership. I hope The Deep End does something similar for the next generation of coaches.\""}, {"id": "s5", "text": "When asked whether the book would match the reach of her previous publication, the widely circulated coaching handbook The Stroke Framework, she was measured. \"The Stroke Framework is a technical tool. The Deep End is a story. They serve different purposes and different readers.\""}, {"id": "s6", "text": "The Deep End by Elena Sorokina. 270 pages. Podium Press. $30."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.sportscoachingbooks.com/reviews/september/the_deep_end"}, "segments": [{"id": "s1", "text": "Maya Osei Reviews The Deep End"}, {"id": "s2", "text": "Sports coaching books tend toward the prescriptive, but Elena Sorokina's The Deep End is something richer and rarer — a genuine memoir that illuminates not only the craft of coaching but the deeply human relationships at its core. This compelling debut, illustrated with photographs from Ms. Sorokina's coaching career and featuring a foreword by sports psychologist Dr. Arjun Mehta, contains over 22 chapters of honest, insightful, and often moving narrative. The writing is direct and the insights are hard-won. My only concern is the price — at $30, it is not inexpensive for a sports coaching memoir by a first-time author, and some readers may hesitate. Those who invest will find a book that genuinely changes how they think about coaching and leadership, and I recommend it unreservedly."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：出版社", "note": "My publisher, Kenji Watanabe → Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "previous publication, the widely circulated coaching handbook The Stroke Framework（Q1/Q2）。The Stroke Framework is a technical tool. The Deep End is a story（Q4：異なる読者層）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $30 ×doc2 s2 の『at $30, it is not inexpensive ... some readers may hesitate』（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article review about The Stroke Framework?", "choices": [{"id": "A", "text": "It is the swimming facility where Ms. Sorokina trains her athletes."}, {"id": "B", "text": "It is a coaching handbook previously published by Ms. Sorokina."}, {"id": "C", "text": "It was co-authored with an Olympic swimmer."}, {"id": "D", "text": "It was recently revised for a new edition."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の previous publication, the coaching handbook The Stroke Framework が Q1正解 a coaching handbook previously published by Ms. Sorokina の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Elena Sorokina?", "choices": [{"id": "A", "text": "She has not published any prior work."}, {"id": "B", "text": "She studied sports journalism before becoming a coach."}, {"id": "C", "text": "She had published prior work before writing this memoir."}, {"id": "D", "text": "She co-manages her publishing career with Kenji Watanabe."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 で過去にハンドブックを出版済み＝Q2正解 had published prior work before writing this memoir。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Mr. Watanabe?", "choices": [{"id": "A", "text": "He is the cover photographer for The Deep End."}, {"id": "B", "text": "He oversees Ms. Sorokina's publishing and editorial direction."}, {"id": "C", "text": "He co-authored The Stroke Framework."}, {"id": "D", "text": "He is one of Ms. Sorokina's former athletes."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の My publisher, Kenji Watanabe＝Q3正解 oversees her publishing and editorial direction。"}}, {"id": "q4", "questionType": "", "stem": "What does Ms. Sorokina say about The Deep End's commercial prospects?", "choices": [{"id": "A", "text": "She expects it to outsell The Stroke Framework."}, {"id": "B", "text": "She believes it will attract the same technical audience as her handbook."}, {"id": "C", "text": "She thinks it will reach a different readership from her previous publication."}, {"id": "D", "text": "She is confident it will become a bestseller in the sports category."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の They serve different purposes and different readers ＝Q4正解 reach a different readership from her previous publication。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on regarding The Deep End?", "choices": [{"id": "A", "text": "The photographs are the most impressive aspect of the book."}, {"id": "B", "text": "The price may be a barrier for some readers."}, {"id": "C", "text": "The writing style is too personal for a general sports audience."}, {"id": "D", "text": "The book would be more effective as a training workshop."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $30 と doc2 s2 の some readers may hesitate＝Q5正解 The price may be a barrier for some readers。"}}]}, {"id": "double-reviews-003", "title": "An Unexpected Plot Twist for a Seasoned Mystery Novelist", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "An Unexpected Plot Twist for a Seasoned Mystery Novelist"}, {"id": "s2", "text": "Fans of Delia Ramiro's mystery novels may be surprised when opening her new book. While Ms. Ramiro's novels usually feature crafty detectives and suspenseful plots interwoven with lengthy descriptions of mouthwatering meals, The Vanishing Plate is all about the recipes."}, {"id": "s3", "text": "This attractive cookbook gives detailed instructions for making the many dishes featured in Ms. Ramiro's fiction, such as the lentil soup served by Derek Donne at the end of The Alpine Enigma, the debut novel that was published while Ms. Ramiro was still a university student."}, {"id": "s4", "text": "\"My literary agent, Bernice Holm, wanted me to write another international thriller,\" Ms. Ramiro said recently in an interview. \"But readers kept asking me about the cuisine in my novels. They wanted to know how they could make it themselves!\""}, {"id": "s5", "text": "For Ms. Ramiro, the new book is not as big a departure as it may seem. \"As a child, I read cookbooks like they were novels,\" she said. \"For me back then, The Saffron Table was as exciting as any adventure story.\""}, {"id": "s6", "text": "When asked whether she expects the new book to be as successful as her previous one, The Garnet Butterfly, Ms. Ramiro had a quick answer. \"It may not sell as many copies, but people will want to keep it for years,\" she said. \"The images in the book are works of art all on their own. Even if you don't make my version of chocolate soufflé, you'll be enchanted by the photograph of it.\""}, {"id": "s7", "text": "The Vanishing Plate by Delia Ramiro. 300 pages. Sand Street Publishing. $50."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.thebooknews.com/reviews/20sept/vanishing_plate"}, "segments": [{"id": "s1", "text": "Hudson Keita Reviews The Vanishing Plate"}, {"id": "s2", "text": "It would seem that everyone is a chef these days. So far this year no fewer than 20 cookbooks by celebrities—actors, writers, and athletes—have hit bookstore shelves. Fortunately, Delia Ramiro's The Vanishing Plate is one of those rare celebrity cookbooks that can hold its own alongside those by professional chefs. This handsomely produced volume, featuring photographs by Selda Solberg and a foreword by award-winning chef Derek Fogt, features over 100 creative and tantalizing recipes. Despite the puzzling title, the recipes themselves are clearly written and generously detailed. If only the book were not priced so exorbitantly ($50 for a cookbook?), I would say that it should become a staple in the kitchen of every home cook."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型（本セットは段落構成が異なる）。過去作(s3)、文芸エージェント(s4)、過去作との比較(s6)、価格(s7)。クロスQ5＝s7×doc2 s2。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：過去作", "note": "The Alpine Enigma, the debut novel that was published while Ms. Ramiro was still a university student（Q1/Q2：過去に小説を出版済み）。"}, {"refs": [{"docId": "doc1", "segmentId": "s4"}], "label": "第1文書：文芸エージェント", "note": "My literary agent, Bernice Holm → Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}], "label": "第1文書：過去作との比較", "note": "It may not sell as many copies（過去作 The Garnet Butterfly ほどは売れないかも）＝Q4。"}, {"refs": [{"docId": "doc1", "segmentId": "s7"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s7 の $50 ×doc2 s2 の『priced so exorbitantly ($50 for a cookbook?)』（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about The Alpine Enigma?", "choices": [{"id": "A", "text": "It is set in a famous restaurant."}, {"id": "B", "text": "It was the first novel Ms. Ramiro published."}, {"id": "C", "text": "It recently became a best seller."}, {"id": "D", "text": "It was published after The Garnet Butterfly."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の The Alpine Enigma, the debut novel ... が Q1正解 the first novel Ms. Ramiro published の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Ms. Ramiro?", "choices": [{"id": "A", "text": "She has worked as a professional chef."}, {"id": "B", "text": "She grew up near a famous restaurant."}, {"id": "C", "text": "She has written books before The Vanishing Plate."}, {"id": "D", "text": "She should become a culinary school instructor."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}, {"docId": "doc1", "segmentId": "s6"}], "explanation": "doc1 s3 の The Alpine Enigma と s6 の The Garnet Butterfly から、過去に複数の本を出版済み＝Q2正解 has written books before The Vanishing Plate。"}}, {"id": "q3", "questionType": "", "stem": "What is most likely true about Ms. Holm?", "choices": [{"id": "A", "text": "She provides recipes for Ms. Ramiro's novels."}, {"id": "B", "text": "She is the photographer mentioned in the online review."}, {"id": "C", "text": "She advises Ms. Ramiro on her writing and publishing."}, {"id": "D", "text": "She recently opened a restaurant named after Ms. Ramiro's book."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s4"}], "explanation": "doc1 s4 の My literary agent, Bernice Holm＝Q3正解 advises Ms. Ramiro on her writing and publishing。"}}, {"id": "q4", "questionType": "", "stem": "At 8:55 A.M., what does Ms. Ramiro most likely mean when she says the book \"may not sell as many copies\"?", "choices": [{"id": "A", "text": "She is free to meet with Ms. Holm."}, {"id": "B", "text": "She completed The Alpine Enigma quickly."}, {"id": "C", "text": "She thinks Ms. Holm would provide good advice."}, {"id": "D", "text": "She believes the cookbook will be less popular than The Garnet Butterfly."}], "answer": "D", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}], "explanation": "doc1 s6 の It may not sell as many copies（過去作 The Garnet Butterfly との比較）＝Q4正解 believes the cookbook will be less popular than The Garnet Butterfly。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about The Vanishing Plate?", "choices": [{"id": "A", "text": "The photography in the book is exceptional."}, {"id": "B", "text": "The book is priced too high."}, {"id": "C", "text": "The recipes are too complex for home cooks."}, {"id": "D", "text": "The book is better than Ms. Ramiro's mystery novels."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s7"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s7 の $50 と doc2 s2 の priced so exorbitantly＝Q5正解 The book is priced too high。"}}]}, {"id": "double-reviews-004", "title": "Celebrated Architect Turns Author", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Celebrated Architect Turns Author"}, {"id": "s2", "text": "Architecture buffs worldwide recognize Paulo Esteves for his award-winning sustainable building designs that have reshaped commercial districts from Lisbon to Melbourne. His new book, The Weight of Stone, is something quite different — a personal memoir tracing his childhood in a small town in northern Portugal and the early experiences that shaped his understanding of space and community."}, {"id": "s3", "text": "\"My publisher, Yuki Hayashi, was expecting another book on sustainable design principles,\" Mr. Esteves said recently. \"But I found myself wanting to write about the places that first made me feel the power of architecture as a child.\""}, {"id": "s4", "text": "For Mr. Esteves, writing memoir was a profound exercise in reflection. \"I have always read architecture memoirs — they are the books that made me believe I could become a designer. I hope The Weight of Stone does the same for a new generation.\""}, {"id": "s5", "text": "Asked if the book will match the reach of his celebrated design guide, The Sustainable City, he was realistic. \"The Sustainable City was for practitioners. The Weight of Stone is for anyone who has ever felt moved by a building.\""}, {"id": "s6", "text": "The Weight of Stone by Paulo Esteves. 260 pages. Archiform Press. $38."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.architecturebookreview.com/reviews/jan/weight_of_stone"}, "segments": [{"id": "s1", "text": "Diana Walsh Reviews The Weight of Stone"}, {"id": "s2", "text": "Architecture memoirs are rarely written with such warmth and literary grace as Paulo Esteves's The Weight of Stone. This evocative debut memoir, illustrated with photographs from the author's personal archive and a foreword by urban planning critic Sara Oliveira, delivers over 18 chapters of beautifully crafted personal narrative on how space, memory, and community intersect. The prose is luminous and the insights are genuine and original. The one drawback is the price — at $38, this is expensive for a memoir, and it may deter readers who would otherwise find it deeply rewarding. For those who do commit, it is an exceptional reading experience, and I recommend it without reservation."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：出版社", "note": "My publisher, Yuki Hayashi → Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "his celebrated design guide, The Sustainable City（Q1/Q2）。The Sustainable City was for practitioners. The Weight of Stone is for anyone（Q4：一般読者へ）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $38 ×doc2 s2 の price drawback（at $38, this is expensive for a memoir）（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about The Sustainable City?", "choices": [{"id": "A", "text": "It is the building project that launched Mr. Esteves's career."}, {"id": "B", "text": "It is a previously published book by Mr. Esteves."}, {"id": "C", "text": "It was co-authored with Yuki Hayashi."}, {"id": "D", "text": "It recently won an international architecture prize."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の design guide, The Sustainable City が Q1正解 a previously published book by Mr. Esteves の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Paulo Esteves?", "choices": [{"id": "A", "text": "He studied creative writing before architecture."}, {"id": "B", "text": "He has not published any work before this memoir."}, {"id": "C", "text": "He had an established publishing career before this memoir."}, {"id": "D", "text": "He co-manages his writing career with Yuki Hayashi."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 で回顧録の前に設計ガイドを出版済み＝Q2正解 had an established publishing career before this memoir。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Ms. Hayashi?", "choices": [{"id": "A", "text": "She is the photographer for The Weight of Stone."}, {"id": "B", "text": "She manages Mr. Esteves's publishing career."}, {"id": "C", "text": "She co-authored The Sustainable City."}, {"id": "D", "text": "She is an architecture critic."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の My publisher, Yuki Hayashi＝Q3正解 manages Mr. Esteves's publishing career。"}}, {"id": "q4", "questionType": "", "stem": "What does Mr. Esteves say about The Weight of Stone's commercial prospects?", "choices": [{"id": "A", "text": "He expects it to outsell The Sustainable City."}, {"id": "B", "text": "He believes it will attract the same professional audience."}, {"id": "C", "text": "He thinks it will reach a broader, more general readership."}, {"id": "D", "text": "He is confident it will become an international bestseller."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の The Weight of Stone is for anyone who has ever felt moved by a building ＝Q4正解 reach a broader, more general readership。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about The Weight of Stone?", "choices": [{"id": "A", "text": "The photography is the highlight of the book."}, {"id": "B", "text": "The price may limit its readership."}, {"id": "C", "text": "The writing style is too academic for a general audience."}, {"id": "D", "text": "The book would work better as a documentary."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $38 と doc2 s2 の price drawback＝Q5正解 The price may limit its readership。"}}]}, {"id": "double-reviews-005", "title": "Marathon World Champion Writes Debut Memoir", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Marathon World Champion Writes Debut Memoir"}, {"id": "s2", "text": "Distance running fans will know Abeba Girma as a four-time world marathon champion whose career has spanned two decades. Her new book, The Long Road, is a deeply personal memoir charting her journey from a small village in Ethiopia to the world's most celebrated marathon circuits, with candid accounts of the hardships, triumphs, and lessons that defined her career."}, {"id": "s3", "text": "\"My sports agent, James Park, suggested I produce a training guide for competitive runners,\" Ms. Girma explained recently. \"But the story I most needed to tell was about the people who gave me the belief that I could run at that level — my mother, my first teacher, my village.\""}, {"id": "s4", "text": "For Ms. Girma, the memoir was an act of gratitude. \"I grew up reading the memoirs of great athletes. They taught me resilience. I hope The Long Road does the same for someone who picks it up.\""}, {"id": "s5", "text": "When asked if the book will match the sales of her popular training guide, The Distance Method, she was candid. \"The Distance Method reached competitive runners. The Long Road is for everyone who has ever worked toward something against the odds.\""}, {"id": "s6", "text": "The Long Road by Abeba Girma. 285 pages. Horizon Books. $26."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.sportsbooks-review.com/reviews/feb/the_long_road"}, "segments": [{"id": "s1", "text": "Tom Hassan Reviews The Long Road"}, {"id": "s2", "text": "Sports memoirs can be formulaic, but Abeba Girma's The Long Road is a compelling exception. This beautifully written debut memoir, featuring a foreword by Olympic athletics coach Jean Moreau and photographs from Ms. Girma's personal collection, presents over 28 chapters of authentic and emotionally resonant narrative. The writing is direct, warm, and consistently inspiring. My only reservation is the cover price — at $26, it is not inexpensive for a paperback memoir, and some casual readers may hesitate before purchasing. Those who do read it, however, will find it profoundly moving and practically impossible to put down, and I recommend it enthusiastically to any fan of sport or human endeavour."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：マネージャー/関係者", "note": "Mr. Park（Ms. Girma の商業活動を管理）→ Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "training guide, The Distance Method（Q1/Q2）。より広い一般読者へ（Q4）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $26 ×doc2 s2 の at $26, it is not inexpensive ... some casual readers may hesitate（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about The Distance Method?", "choices": [{"id": "A", "text": "It is Ms. Girma's memoir about her training philosophy."}, {"id": "B", "text": "It is a training guide previously published by Ms. Girma."}, {"id": "C", "text": "It was co-written with her coach."}, {"id": "D", "text": "It was recently updated with a new edition."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の training guide, The Distance Method が Q1正解 a training guide previously published by Ms. Girma の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Abeba Girma?", "choices": [{"id": "A", "text": "She has not published any work before this memoir."}, {"id": "B", "text": "She studied sports journalism before becoming a runner."}, {"id": "C", "text": "She published prior work before writing this memoir."}, {"id": "D", "text": "She co-manages her publishing career with James Park."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 で回顧録の前にガイドを出版済み＝Q2正解 published prior work before writing this memoir。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Mr. Park?", "choices": [{"id": "A", "text": "He is the photographer for The Long Road."}, {"id": "B", "text": "He manages Ms. Girma's professional and commercial activities."}, {"id": "C", "text": "He co-authored The Distance Method."}, {"id": "D", "text": "He is Ms. Girma's former marathon coach."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の Mr. Park（Ms. Girma の関係者）＝Q3正解 manages Ms. Girma's professional and commercial activities。"}}, {"id": "q4", "questionType": "", "stem": "What does Ms. Girma say about The Long Road's commercial prospects?", "choices": [{"id": "A", "text": "She expects it to outsell The Distance Method."}, {"id": "B", "text": "She believes it will attract competitive runners."}, {"id": "C", "text": "She thinks it will reach a broader general audience than her training guide."}, {"id": "D", "text": "She is confident it will top the bestseller lists."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の著者の弁（一般読者向け）＝Q4正解 reach a broader general audience than her training guide。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about The Long Road?", "choices": [{"id": "A", "text": "The photographs are exceptional."}, {"id": "B", "text": "The price may discourage some potential readers."}, {"id": "C", "text": "The writing is too technical for a general audience."}, {"id": "D", "text": "The memoir is better suited to competitive athletes."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $26 と doc2 s2 の some casual readers may hesitate＝Q5正解 The price may discourage some potential readers。"}}]}, {"id": "double-reviews-006", "title": "Jazz Pianist Makes Literary Debut", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Jazz Pianist Makes Literary Debut"}, {"id": "s2", "text": "Jazz audiences worldwide have admired Kenji Ito's piano artistry for three decades, from his breakthrough debut as a teenager in Tokyo to his status today as one of the most innovative composers in contemporary jazz. His new book, Still Waters, is an intimate memoir exploring the musical and personal experiences that shaped his artistic voice and philosophy."}, {"id": "s3", "text": "\"My manager, Lily Chen, expected me to write a guide on jazz improvisation technique,\" Mr. Ito said in a recent interview. \"But what I really wanted to share was the emotional journey behind the music — the moments of doubt, revelation, and connection that shaped every composition.\""}, {"id": "s4", "text": "For Mr. Ito, writing offered a new kind of honesty. \"I have read musicians' memoirs throughout my career. They showed me that art and life are never separate. I hope Still Waters communicates the same truth.\""}, {"id": "s5", "text": "Asked if the memoir will match the success of his well-known technique guide, The Jazz Principles, he was thoughtful. \"The Jazz Principles was for musicians. Still Waters is for anyone who has ever been moved by music.\""}, {"id": "s6", "text": "Still Waters by Kenji Ito. 270 pages. Nocturne Press. $32."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.musicmemoirreviews.net/reviews/oct/still_waters"}, "segments": [{"id": "s1", "text": "Elena Ross Reviews Still Waters"}, {"id": "s2", "text": "Music memoirs rarely achieve the literary quality of Still Waters by Kenji Ito. This beautifully constructed debut memoir, featuring intimate personal photographs and a foreword by music critic David Blanc, offers over 24 chapters of lyrical, honest, and deeply human narrative. The writing is clear and the emotional depth is considerable throughout. My only hesitation is the price — $32 for a first memoir is at the higher end, and some readers may need an extra reason to invest. Those who do will find a book that stays with them long after finishing, and I recommend it without reservation to anyone who loves jazz or great memoir writing."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：マネージャー/関係者", "note": "Ms. Chen（Mr. Ito の career・business を管理）→ Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "technique guide, The Jazz Principles（Q1/Q2）。より広い一般読者へ（Q4）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $32 ×doc2 s2 の $32 for a first memoir is at the higher end ... an extra reason to invest（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about The Jazz Principles?", "choices": [{"id": "A", "text": "It is the recording studio where Mr. Ito made his first album."}, {"id": "B", "text": "It is a previously published book by Mr. Ito."}, {"id": "C", "text": "It was co-written with a jazz educator."}, {"id": "D", "text": "It was recently revised for a new edition."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の technique guide, The Jazz Principles が Q1正解 a previously published book by Mr. Ito の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Kenji Ito?", "choices": [{"id": "A", "text": "He has not published any prior books."}, {"id": "B", "text": "He studied music journalism before becoming a musician."}, {"id": "C", "text": "He had published prior work before writing this memoir."}, {"id": "D", "text": "He co-manages his career with Lily Chen. some readers。"}}]}, {"id": "double-reviews-007", "title": "Wildlife Filmmaker Publishes First Book", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Wildlife Filmmaker Publishes First Book"}, {"id": "s2", "text": "Television viewers in over 60 countries recognize Amara Osei as the presenter and narrator behind the acclaimed nature documentary series Wild Earth. His debut book, Voices from the Forest, brings his wildlife storytelling into print for the first time, offering an immersive personal account of his journeys deep into the world's most biodiverse rainforest ecosystems."}, {"id": "s3", "text": "\"My producer, Sarah Kim, was hoping I would write a companion guide to Wild Earth,\" Mr. Osei said in a recent interview. \"But I wanted to write about what a camera can't fully show — the intimacy of sitting still in the dark of a rainforest waiting for something to happen.\""}, {"id": "s4", "text": "For Mr. Osei, print allowed a slower and more contemplative form of storytelling. \"I grew up reading naturalists' diaries and expedition journals. They gave me the hunger to go into the field. I hope Voices from the Forest does the same for a new reader.\""}, {"id": "s5", "text": "Asked if the book would match the reach of Wild Earth, he was modest. \"A documentary and a book work on different rhythms. The book will reach readers who want to sit with these experiences more quietly than a documentary allows.\""}, {"id": "s6", "text": "Voices from the Forest by Amara Osei. 255 pages. Canopy Press. $34."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.naturebooksreview.com/reviews/aug/voices_from_forest"}, "segments": [{"id": "s1", "text": "Clara Benson Reviews Voices from the Forest"}, {"id": "s2", "text": "Nature writing is a well-populated shelf, but Amara Osei's Voices from the Forest earns a distinguished place on it. This evocative debut, beautifully illustrated with wildlife photographs by Mei Lin and with a foreword by conservation scientist Dr. Thomas Reid, offers chapters of sensory, patient, and deeply observant prose that transport readers into the heart of living rainforests. The writing is unhurried and precise. The one concern is the price — $34 for a debut nature book is not inexpensive, and casual readers may hesitate. However, for anyone with a genuine love of the natural world and immersive non-fiction, this is an essential purchase, and I recommend it unreservedly."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。過去実績は本ではなくテレビドキュメンタリー(Wild Earth)。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：プロデューサー", "note": "My producer, Sarah Kim（Wild Earth の制作）→ Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s2"}, {"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去のメディア実績＋著者の弁", "note": "presenter and narrator behind the documentary series Wild Earth（Q1/Q2：本ではなくドキュメンタリー番組の実績）。より静かに味わう読者へ（Q4）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $34 ×doc2 s2 の $34 for a debut nature book is not inexpensive ... casual readers may hesitate（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about Wild Earth?", "choices": [{"id": "A", "text": "It is the rainforest region where Mr. Osei conducts research."}, {"id": "B", "text": "It is a documentary series presented by Mr. Osei."}, {"id": "C", "text": "It was co-produced with Sarah Kim's production company."}, {"id": "D", "text": "It recently won a major broadcasting award."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "doc1 s2 の presenter and narrator behind the nature documentary series Wild Earth が Q1正解 a documentary series presented by Mr. Osei の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Amara Osei?", "choices": [{"id": "A", "text": "He has not produced or published any prior work."}, {"id": "B", "text": "He studied nature writing before becoming a filmmaker."}, {"id": "C", "text": "He had an established media career before writing this book."}, {"id": "D", "text": "He co-directs Wild Earth with Sarah Kim."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s2"}], "explanation": "doc1 s2 で本の出版前にメディアで実績を確立済み＝Q2正解 had an established media career before writing this book。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Ms. Kim?", "choices": [{"id": "A", "text": "She manages the publishing and marketing of Mr. Osei's book."}, {"id": "B", "text": "She is the wildlife photographer who contributed to the book."}, {"id": "C", "text": "She oversees the production of Wild Earth."}, {"id": "D", "text": "She co-authored Voices from the Forest."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の My producer, Sarah Kim＝Q3正解 oversees the production of Wild Earth。"}}, {"id": "q4", "questionType": "", "stem": "What does Mr. Osei say about Voices from the Forest's commercial prospects?", "choices": [{"id": "A", "text": "He expects it to reach a larger audience than Wild Earth."}, {"id": "B", "text": "He believes the book and the documentary share the same audience."}, {"id": "C", "text": "He thinks the book will reach readers who prefer a more reflective experience."}, {"id": "D", "text": "He is confident it will become a bestselling nature title."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の著者の弁（より静かに体験を味わいたい読者へ）＝Q4正解 reach readers who prefer a more reflective experience。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about Voices from the Forest?", "choices": [{"id": "A", "text": "The wildlife photographs are the most impressive element."}, {"id": "B", "text": "The price may limit the book's readership."}, {"id": "C", "text": "The writing is too scientific for a general audience."}, {"id": "D", "text": "The book would work better as a film."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $34 と doc2 s2 の casual readers may hesitate＝Q5正解 The price may limit the book's readership。"}}]}, {"id": "double-reviews-008", "title": "Champion Cyclist Turns Author", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Champion Cyclist Turns Author"}, {"id": "s2", "text": "Professional cycling fans have followed Miguel Fontes for fifteen years, from his debut as a young climber in his native Portugal to his back-to-back Tour victories. His debut book, Against the Wind, is a candid memoir tracing his journey from a working-class childhood in Porto to the peaks of international cycling, with honest accounts of injury, doubt, and hard-won triumph."}, {"id": "s3", "text": "\"My agent, Naomi Park, pushed me to write a performance coaching book for competitive cyclists,\" Mr. Fontes said in a recent interview. \"But I felt the more important story was about what keeps an athlete going when everything is against them — and that's a human story, not a sports story.\""}, {"id": "s4", "text": "For Mr. Fontes, memoir was the right vehicle for honesty. \"I have read athletes' memoirs my whole life. They gave me the belief that I was not alone in my struggles. I hope Against the Wind does the same.\""}, {"id": "s5", "text": "When asked if the memoir would match the sales of his training guide, Peak Performance Cycling, he was measured. \"Peak Performance Cycling was written for cyclists. Against the Wind is for anyone who has ever pushed themselves past what they thought possible.\""}, {"id": "s6", "text": "Against the Wind by Miguel Fontes. 288 pages. Peloton Press. $28."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.sportsreadingclub.com/reviews/march/against_the_wind"}, "segments": [{"id": "s1", "text": "James Obi Reviews Against the Wind"}, {"id": "s2", "text": "Sports memoirs often follow a predictable arc, but Miguel Fontes's Against the Wind breaks the mould with its disarming candour and literary quality. This impressive debut memoir, featuring a foreword by sports psychologist Dr. Ana Lopes and photographs from Mr. Fontes's personal collection, delivers over 26 chapters of honest, moving, and at times humorous personal narrative. The writing is warm and the emotional intelligence on display is considerable. My one concern is the price — at $28, it is not cheap for a sporting memoir in paperback, and some readers may hesitate before buying. For those who do commit, it is a profoundly human and inspiring book, and I recommend it wholeheartedly."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：マネージャー/関係者", "note": "Ms. Park（Mr. Fontes の活動を管理）→ Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "training guide, Peak Performance Cycling（Q1/Q2）。より広い一般読者へ（Q4）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $28 ×doc2 s2 の at $28, it is not cheap ... some readers may hesitate（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about Peak Performance Cycling?", "choices": [{"id": "A", "text": "It is Mr. Fontes's championship cycling program."}, {"id": "B", "text": "It is a previously published book by Mr. Fontes."}, {"id": "C", "text": "It was co-written with a sports scientist."}, {"id": "D", "text": "It was recently updated with new training data."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の training guide, Peak Performance Cycling が Q1正解 a previously published book by Mr. Fontes の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Miguel Fontes?", "choices": [{"id": "A", "text": "He has not published any prior books."}, {"id": "B", "text": "He studied sports journalism before becoming a cyclist."}, {"id": "C", "text": "He published prior work before writing this memoir."}, {"id": "D", "text": "He co-manages his career with Naomi Park."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 で回顧録の前にガイドを出版済み＝Q2正解 published prior work before writing this memoir。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Ms. Park?", "choices": [{"id": "A", "text": "She is the cover designer for Against the Wind."}, {"id": "B", "text": "She manages Mr. Fontes's professional and publishing activities."}, {"id": "C", "text": "She co-authored Peak Performance Cycling."}, {"id": "D", "text": "She is a sports journalist."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の Ms. Park（Mr. Fontes の関係者）＝Q3正解 manages Mr. Fontes's professional and publishing activities。"}}, {"id": "q4", "questionType": "", "stem": "What does Mr. Fontes say about Against the Wind's commercial prospects?", "choices": [{"id": "A", "text": "He expects it to outsell Peak Performance Cycling."}, {"id": "B", "text": "He believes it will attract the same cycling audience."}, {"id": "C", "text": "He thinks it will reach a broader, more general readership than his training guide."}, {"id": "D", "text": "He is confident it will become a bestseller immediately."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の著者の弁＝Q4正解 reach a broader, more general readership than his training guide。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about Against the Wind?", "choices": [{"id": "A", "text": "The photographs are the most memorable element."}, {"id": "B", "text": "The price may give some readers pause."}, {"id": "C", "text": "The writing is too personal for a sports audience."}, {"id": "D", "text": "The book is more about cycling technique than personal story."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $28 と doc2 s2 の some readers may hesitate＝Q5正解 The price may give some readers pause。"}}]}, {"id": "double-reviews-009", "title": "Celebrity Chef Steps Into Fiction", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Celebrity Chef Steps Into Fiction"}, {"id": "s2", "text": "Home cooks and food lovers worldwide know Isabelle Moreau as the host of the beloved television cooking series A Table for Six. Her debut novel, The Saffron Kitchen, is a culinary mystery set in the competitive world of a fictional Paris restaurant, drawing on Ms. Moreau's years of experience in professional kitchens."}, {"id": "s3", "text": "\"My publisher, George Tan, was expecting me to produce another cookbook,\" Ms. Moreau said in a recent interview. \"But I kept imagining the characters — the rivalries, the secrets, the love affairs hidden in a kitchen. A novel was the only form that could hold all of that.\""}, {"id": "s4", "text": "For Ms. Moreau, fiction offered a new kind of creative freedom. \"I have always read crime fiction. It is my guilty pleasure. Writing The Saffron Kitchen was the most liberating thing I have done since opening my first restaurant.\""}, {"id": "s5", "text": "When asked if she expects The Saffron Kitchen to match the commercial success of her popular cookbook, The French Country Table, she was realistic. \"The French Country Table has a very specific loyal audience. The Saffron Kitchen might bring in readers who love food and also love mystery.\""}, {"id": "s6", "text": "The Saffron Kitchen by Isabelle Moreau. 320 pages. Bistro Books. $36."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.culinaryfictionreview.com/reviews/june/saffron_kitchen"}, "segments": [{"id": "s1", "text": "Peter Nakamura Reviews The Saffron Kitchen"}, {"id": "s2", "text": "Celebrity fiction is often a vanity project, but Isabelle Moreau's The Saffron Kitchen is a genuine and entertaining debut novel that earns its place on the shelf next to titles by professional crime writers. This engagingly crafted story, featuring a foreword by food writer Julia Stein and rich authentic detail about restaurant kitchen life, offers a clever and satisfying mystery plot embedded in a vividly drawn culinary world. The writing is confident and the pacing is impressive for a first novel. The one drawback is the cover price — $36 for a debut novel is at the higher end of the range, and some readers may need convincing. Those who take the plunge will find it well worth the investment, and I recommend it warmly to anyone who enjoys food and fiction in equal measure."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。今回は初の小説(debut novel)、過去にクックブック。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotations": [{"refs": [{"docId": "doc1", "segmentId": "s3"}], "label": "第1文書：出版社/編集", "note": "Mr. Tan（Ms. Moreau の出版・編集を統括）→ Q3。"}, {"refs": [{"docId": "doc1", "segmentId": "s5"}], "label": "第1文書：過去の出版実績＋著者の弁", "note": "cookbook, The French Country Table（Q1/Q2：小説の前にクックブックを出版済み）。異なる読者層へ（Q4）。"}, {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "label": "クロス：共通の価格懸念", "note": "doc1 s6 の $36 ×doc2 s2 の $36 for a debut novel is at the higher end ... some readers may need convincing（Q5）。"}]}, "questions": [{"id": "q1", "questionType": "", "stem": "What is indicated in the article about The French Country Table?", "choices": [{"id": "A", "text": "It is the restaurant where Ms. Moreau trained as a chef."}, {"id": "B", "text": "It is a cookbook previously published by Ms. Moreau."}, {"id": "C", "text": "It was co-written with a fellow television chef."}, {"id": "D", "text": "It was recently nominated for a culinary award."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の cookbook, The French Country Table が Q1正解 a cookbook previously published by Ms. Moreau の根拠。"}}, {"id": "q2", "questionType": "", "stem": "What can be concluded about Isabelle Moreau?", "choices": [{"id": "A", "text": "She has not published any prior books."}, {"id": "B", "text": "She studied creative writing before becoming a chef."}, {"id": "C", "text": "She had published prior work before writing this novel."}, {"id": "D", "text": "She co-manages her publishing career with George Tan."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 で小説の前にクックブックを出版済み＝Q2正解 had published prior work before writing this novel。"}}, {"id": "q3", "questionType": "", "stem": "Who most likely is Mr. Tan?", "choices": [{"id": "A", "text": "He is the cover designer for The Saffron Kitchen."}, {"id": "B", "text": "He oversees Ms. Moreau's publishing and editorial direction."}, {"id": "C", "text": "He co-authored The French Country Table."}, {"id": "D", "text": "He is a food critic."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の Mr. Tan＝Q3正解 oversees Ms. Moreau's publishing and editorial direction。"}}, {"id": "q4", "questionType": "", "stem": "What does Ms. Moreau say about The Saffron Kitchen's commercial prospects?", "choices": [{"id": "A", "text": "She expects it to outsell The French Country Table."}, {"id": "B", "text": "She believes it will attract the same loyal cookbook audience."}, {"id": "C", "text": "She thinks it will reach a different readership from her cookbook."}, {"id": "D", "text": "She is confident it will become an international bestseller."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の著者の弁＝Q4正解 reach a different readership from her cookbook。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about The Saffron Kitchen?", "choices": [{"id": "A", "text": "The restaurant detail is the most impressive element."}, {"id": "B", "text": "The price may deter some potential readers."}, {"id": "C", "text": "The mystery plot is the weakest element."}, {"id": "D", "text": "The novel is better than Ms. Moreau's cookbook."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $36 と doc2 s2 の higher end ... need convincing＝Q5正解 The price may deter some potential readers。"}}]}, {"id": "double-reviews-010", "title": "Award-Winning Journalist Tries Her Hand at Crime Fiction", "difficulty": "standard", "passage": {"format": "double", "directions": "Questions 1-5 refer to the following reviews of a book.", "documents": [{"id": "doc1", "docType": "document", "label": "Document 1", "segments": [{"id": "s1", "text": "Award-Winning Journalist Tries Her Hand at Crime Fiction"}, {"id": "s2", "text": "Readers who follow international affairs journalism will recognize Nina Adler as the two-time winner of the Global Press Award for investigative reporting. Her debut crime novel, The Glass Signal, draws on her decade of experience reporting from conflict zones to tell the story of a foreign correspondent who uncovers a political conspiracy while on assignment."}, {"id": "s3", "text": "\"My editor at the newspaper, Sam Ishida, expected me to produce a second book of long-form journalism,\" Ms. Adler explained in a recent interview. \"But I kept thinking about the fictional version of stories I had seen in real life — the ones too dangerous to publish but too powerful to forget.\""}, {"id": "s4", "text": "For Ms. Adler, fiction felt like a natural extension of her storytelling craft. \"I have read crime fiction and espionage novels for as long as I can remember. I felt I had a story that needed that form.\""}, {"id": "s5", "text": "When asked if The Glass Signal would match the sales of her acclaimed journalism collection, Frontlines, she was candid. \"Frontlines was read by people who follow current affairs. The Glass Signal is for anyone who loves a tightly plotted thriller.\""}, {"id": "s6", "text": "The Glass Signal by Nina Adler. 340 pages. Dispatch Books. $33."}]}, {"id": "doc2", "docType": "webpage", "label": "Web Page", "header": {"url": "https://www.crimefictionreview.com/reviews/july/glass_signal"}, "segments": [{"id": "s1", "text": "Mark Okonkwo Reviews The Glass Signal"}, {"id": "s2", "text": "Political thrillers are a crowded genre, but Nina Adler's The Glass Signal distinguishes itself with genuine journalistic authenticity and compelling narrative momentum. This confident debut crime novel, featuring a foreword by author and foreign correspondent Leo Dubois and crackling, well-researched dialogue, delivers a plot that feels both urgent and credible from start to finish. The writing is sharp and the insider detail about international journalism lends the story real authority. My only hesitation is the price — at $33, this is on the higher side for a debut novel, and some readers may pause before committing. For those who do, it is a thoroughly satisfying read, and I recommend it warmly to fans of intelligent political thrillers."}]}]}, "structureExplanation": {"summary": "紹介記事＋書評の定型。今回は初のミステリー小説、過去にジャーナリズム本。クロスQ5＝doc1の価格(s6)×doc2 s2の懸念。", "annotati n editor."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s3"}], "explanation": "doc1 s3 の Mr. Ishida＝Q3正解 oversees Ms. Adler's editorial direction at the newspaper。"}}, {"id": "q4", "questionType": "", "stem": "What does Ms. Adler say about The Glass Signal's commercial prospects?", "choices": [{"id": "A", "text": "She expects it to outsell Frontlines."}, {"id": "B", "text": "She believes it will attract the same readers as her journalism."}, {"id": "C", "text": "She thinks it will reach a different audience from her journalism collection."}, {"id": "D", "text": "She is confident it will become an international bestseller."}], "answer": "C", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s5"}], "explanation": "doc1 s5 の著者の弁＝Q4正解 reach a different audience from her journalism collection。"}}, {"id": "q5", "questionType": "", "stem": "What do both reviewers agree on about The Glass Signal?", "choices": [{"id": "A", "text": "The journalistic detail is the most impressive element."}, {"id": "B", "text": "The price may be a barrier for some readers."}, {"id": "C", "text": "The plot is too complex for a general audience."}, {"id": "D", "text": "The book would work better as a documentary."}], "answer": "B", "evidence": {"refs": [{"docId": "doc1", "segmentId": "s6"}, {"docId": "doc2", "segmentId": "s2"}], "explanation": "クロス：doc1 s6 の $33 と doc2 s2 の on the higher side ... may pause＝Q5正解 The price may be a barrier for some readers。"}}]}], "event-notice": [{"id": "event-notice-001", "title": "International Food & Beverage Expo", "difficulty": "standard", "passage": {"format": "single", "directions": "Questions 1-2 refer to the following information.", "documents": [{"id": "doc1", "docType": "document", "segments": [{"id": "s1", "text": "International Food & Beverage Expo"}, {"id": "s2", "text": "June 20 and 21, 9:00 A.M.–6:00 P.M."}, {"id": "s3", "text": "Exhibitor Information"}, {"id": "s4", "text": "Each exhibitor at the International Food var KEY = "toeic_p7_progress";

function readProg(){ try{ var r=localStorage.getItem(KEY); if(!r) return {schemaVersion:1,byType:{}}; var d=JSON.parse(r); if(!d.byType)d.byType={}; return d; }catch(e){ return {schemaVersion:1,byType:{}}; } }
function writeProg(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){} }
function typeProg(id){ return readProg().byType[id] || {completedSets:[],lastSetId:null,results:{}}; }
function completedCount(id){ return typeProg(id).completedSets.length; }
function isSetComplete(id,setId){ return typeProg(id).completedSets.indexOf(setId)!==-1; }
function recordResult(id,setId,correct,total){ var d=readProg(); var tp=d.byType[id]||{completedSets:[],lastSetId:null,results:{}}; if(tp.completedSets.indexOf(setId)===-1)tp.completedSets.push(setId); tp.lastSetId=setId; tp.results[setId]={correct:correct,total:total,answeredAt:new Date().toISOString()}; d.byType[id]=tp; d.schemaVersion=1; writeProg(d); }

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
function sortedTypes(){ return DATA.types.slice().sort(function(a,b){ return a.order-b.order; }); }
function setsOf(id){ return DATA.sets[id] || []; }
function isAvailable(id){ return setsOf(id).length>0; }
function segId(d,s){ return "seg-"+d+"-"+s; }

var ST={};

/* ---- top ---- */
function showTop(){
  var app=document.getElementById("app");
  var html='<header class="site-header"><h1>TOEIC Part 7 構造学習</h1><p class="lead">15タイプ × 各10セット。タイプを選んで構造から読む練習をします。</p></header><main class="container"><div class="type-grid">';
  sortedTypes().forEach(function(t){
    var avail=isAvailable(t.id);
    var done=completedCount(t.id);
    var inner='<div class="type-order">Type '+esc(t.order)+'</div><h2 class="type-name">'+esc(t.name)+'</h2><p class="type-name-en">'+esc(t.nameEn)+'</p><p class="type-desc">'+esc(t.description)+'</p><div class="type-progress'+(avail&&done>=t.setCount?" is-complete":"")+'">'+(avail?"進捗 "+done+"/"+t.setCount:"準備中")+'</div>';
    if(avail){ html+='<a class="type-card" href="#" data-type="'+esc(t.id)+'">'+inner+'</a>'; }
    else { html+='<div class="type-card is-disabled" aria-disabled="true">'+inner+'</div>'; }
  });
  html+='</div></main>';
  app.innerHTML=html;
  app.querySelectorAll("a.type-card").forEach(function(a){
    a.addEventListener("click",function(e){ e.preventDefault(); showStudy(a.dataset.type,0); });
  });
  window.scrollTo(0,0);
}

/* ---- study renderers ---- */
function renderPrediction(typeMeta,set){
  var base=typeMeta.defaultTypePrediction||{note:"",points:[]};
  var sup=set.typePredictionSupplement||{};
  var html='<section class="block block-prediction"><h2>型予測の注記</h2>';
  if(base.note) html+='<p class="pred-note">'+esc(base.note)+'</p>';
  if(sup.note) html+='<p class="pred-note pred-supplement">＋ '+esc(sup.note)+'</p>';
  var points=(base.points||[]).concat(sup.points||[]);
  if(points.length){ html+='<ul class="pred-points">'; points.forEach(function(p){ html+='<li>'+esc(p)+'</li>'; }); html+='</ul>'; }
  return html+'</section>';
}
function renderHeader(doc){
  var h=doc.header||{}; var html="";
  if(doc.label) html+='<div class="doc-label">'+esc(doc.label)+'</div>';
  if(h.url) html+='<div class="url-bar">'+esc(h.url)+'</div>';
  if(h.title) html+='<h3 class="doc-title">'+esc(h.title)+'</h3>';
  var rows=["from","to","date","subject"]; var meta="";
  rows.forEach(function(k){ if(h[k]) meta+='<div><span class="hk">'+k.toUpperCase()+':</span> '+esc(h[k])+'</div>'; });
  if(meta) html+='<div class="doc-header">'+meta+'</div>';
  return html;
}
function renderPassage(passage){
  var html='<section class="block block-passage">';
  if(passage.directions) html+='<p class="directions">'+esc(passage.directions)+'</p>';
  passage.documents.forEach(function(doc){
    html+='<article class="doc doc-'+esc(doc.docType)+'">'+renderHeader(doc)+'<div class="doc-body">';
    doc.segments.forEach(function(s){ html+='<span class="segment" id="'+segId(doc.id,s.id)+'">'+esc(s.text)+' </span>'; });
    html+='</div></article>';
  });
  return html+'</section>';
}
function renderStructure(set){
  var se=set.structureExplanation;
  var has=se&&se.annotations&&se.annotations.length;
  if(!se||(!se.summary&&!has)) return "";
  var html='<section class="block block-structure"><h2>構造解説</h2>';
  if(se.summary) html+='<p class="struct-summary">'+esc(se.summary)+'</p>';
  if(has){ html+='<ul class="struct-annotations">'; se.annotations.forEach(function(a){
    html+='<li>';
    if(a.label) html+='<span class="struct-label">'+esc(a.label)+'</span>';
    if(a.structure) html+='<div class="struct-svo">'+esc(a.structure)+'</div>';
    if(a.note) html+='<div class="struct-note">'+esc(a.note)+'</div>';
    html+='</li>';
  }); html+='</ul>'; }
  return html+'</section>';
}
function buildQuestions(set){
  var wrap=document.createElement("section"); wrap.className="block block-questions";
  var h=document.createElement("h2"); h.textContent="設問"; wrap.appendChild(h);
  set.questions.forEach(function(q,i){ wrap.appendChild(buildQuestion(q,i+1)); });
  return wrap;
}
function buildQuestion(q,number){
  var qEl=document.createElement("div"); qEl.className="question";
  var stem=document.createElement("p"); stem.className="q-stem"; stem.textContent=number+". "+q.stem; qEl.appendChild(stem);
  var choicesEl=document.createElement("div"); choicesEl.className="choices";
  var selected=null;
  var gradeBtn=document.createElement("button"); gradeBtn.className="grade-btn"; gradeBtn.textContent="解答する"; gradeBtn.disabled=true;
  q.choices.forEach(function(c){
    var btn=document.createElement("button"); btn.className="choice"; btn.dataset.choice=c.id;
    btn.innerHTML='<span class="choice-id">'+esc(c.id)+'</span><span class="choice-text">'+esc(c.text)+'</span>';
    btn.addEventListener("click",function(){
      if(qEl.classList.contains("is-graded")) return;
      selected=c.id;
      choicesEl.querySelectorAll(".choice").forEach(function(b){ b.classList.toggle("is-selected",b===btn); });
      gradeBtn.disabled=false;
    });
    choicesEl.appendChild(btn);
  });
  qEl.appendChild(choicesEl);
  var feedback=document.createElement("div"); feedback.className="feedback"; feedback.hidden=true;
  qEl.appendChild(gradeBtn); qEl.appendChild(feedback);
  gradeBtn.addEventListener("click",function(){
    if(!selected||qEl.classList.contains("is-graded")) return;
    grade(q,qEl,choicesEl,feedback,selected); gradeBtn.disabled=true;
  });
  return qEl;
}
function grade(q,qEl,choicesEl,feedback,selected){
  qEl.classList.add("is-graded");
  var correct=selected===q.answer; ST.answered[q.id]=correct;
  choicesEl.querySelectorAll(".choice").forEach(function(b){
    b.disabled=true;
    if(b.dataset.choice===q.answer) b.classList.add("is-correct");
    if(b.dataset.choice===selected&&!correct) b.classList.add("is-wrong");
  });
  var refs=(q.evidence&&q.evidence.refs)||[];
  refs.forEach(function(r){ var el=document.getElementById(segId(r.docId,r.segmentId)); if(el) el.classList.add("is-evidence"); });
  var html='<p class="verdict '+(correct?"is-correct":"is-wrong")+'">'+(correct?"正解":"不正解")+'（正解: '+esc(q.answer)+'）</p>';
  if(q.evidence&&q.evidence.explanation) html+='<p class="explanation">'+esc(q.evidence.explanation)+'</p>';
  feedback.innerHTML=html; feedback.hidden=false;
  checkCompletion();
}
function checkCompletion(){
  var total=ST.set.questions.length;
  if(Object.keys(ST.answered).length<total) return;
  var correct=0; Object.keys(ST.answered).forEach(function(k){ if(ST.answered[k]) correct++; });
  recordResult(ST.typeMeta.id,ST.set.id,correct,total);
  var slot=document.getElementById("structure-slot"); if(slot) slot.innerHTML=renderStructure(ST.set);
  var next=ST.allSets[ST.setIndex+1];
  var banner=document.getElementById("complete-banner");
  var actions='<a href="#" id="to-top">← タイプ一覧へ戻る</a>';
  if(next) actions+='　<a href="#" id="to-next">次のセットへ →</a>';
  banner.innerHTML='<p>完了しました。スコア '+correct+' / '+total+'　'+actions+'</p>';
  banner.hidden=false;
  var tt=document.getElementById("to-top"); if(tt) tt.addEventListener("click",function(e){ e.preventDefault(); showTop(); });
  var tn=document.getElementById("to-next"); if(tn) tn.addEventListener("click",function(e){ e.preventDefault(); showStudy(ST.typeMeta.id,ST.setIndex+1); });
  banner.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function renderSetNav(){
  var nav=document.getElementById("set-nav");
  var sets=ST.allSets, idx=ST.setIndex;
  var wrap=document.createElement("div"); wrap.className="setnav-inner";
  var prevBtn=document.createElement("button"); prevBtn.className="nav-btn"; prevBtn.textContent="← 前のセット"; prevBtn.disabled=idx<=0;
  if(idx>0) prevBtn.addEventListener("click",function(){ showStudy(ST.typeMeta.id,idx-1); });
  var select=document.createElement("select"); select.className="set-select";
  sets.forEach(function(s,i){ var opt=document.createElement("option"); opt.value=i; var done=isSetComplete(ST.typeMeta.id,s.id)?" ✓":""; opt.textContent="Set "+(i+1)+" / "+sets.length+done; if(i===idx) opt.selected=true; select.appendChild(opt); });
  select.addEventListener("change",function(){ showStudy(ST.typeMeta.id,parseInt(select.value,10)); });
  var nextBtn=document.createElement("button"); nextBtn.className="nav-btn"; nextBtn.textContent="次のセット →"; nextBtn.disabled=idx>=sets.length-1;
  if(idx<sets.length-1) nextBtn.addEventListener("click",function(){ showStudy(ST.typeMeta.id,idx+1); });
  wrap.appendChild(prevBtn); wrap.appendChild(select); wrap.appendChild(nextBtn);
  nav.innerHTML=""; nav.appendChild(wrap);
}
function showStudy(typeId,idx){
  var typeMeta=DATA.types.filter(function(t){ return t.id===typeId; })[0];
  var sets=setsOf(typeId);
  if(!typeMeta||!sets.length){ showTop(); return; }
  if(idx<0) idx=0; if(idx>=sets.length) idx=sets.length-1;
  var set=sets[idx];
  ST={typeMeta:typeMeta,allSets:sets,setIndex:idx,set:set,answered:{}};
  var app=document.getElementById("app");
  app.innerHTML='<header class="site-header study-header"><a class="back-link" href="#" id="back">← 一覧</a><h1 id="study-title">Type '+typeMeta.order+'：'+esc(typeMeta.name)+'</h1></header><main class="container"><div id="complete-banner" class="complete-banner" hidden></div><nav id="set-nav" class="set-nav"></nav><div id="study-root"></div></main>';
  document.getElementById("back").addEventListener("click",function(e){ e.preventDefault(); showTop(); });
  renderSetNav();
  var root=document.getElementById("study-root");
  root.innerHTML=renderPrediction(typeMeta,set)+renderPassage(set.passage);
  root.appendChild(buildQuestions(set));
  var slot=document.createElement("div"); slot.id="structure-slot"; root.appendChild(slot);
  window.scrollTo(0,0);
}

showTop();
</script>
</body>
</html>
